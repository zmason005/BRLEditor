<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille BRF Editor - Auto-Gutter</title>
    <link rel="stylesheet" href="braille-editor.css">
    <style>
        body { overflow-x: hidden; width: 100vw; background-color: #000; color: #fff; }
        #editor {
            width: 90vw !important;
            margin: 0 auto !important;
            display: block;
            overflow-x: hidden !important; 
            white-space: pre;
            word-wrap: normal; 
            box-sizing: border-box;
            padding: 10px;
            font-family: 'SimBraille', 'Courier New', monospace;
            line-height: 1.5;
            border: 2px solid #fff;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="top-section">
        <h2>Braille Editor: Auto-Gutter</h2>
        <p>Line numbers populate automatically on every new line.</p>
    </div>

    <div class="controls">
        <button class="btn-copy" onclick="copyToClipboard()">Copy to Clipboard</button>
        <button class="btn-format" onclick="manualReflow()">Manual Reflow</button>
        <button class="btn-clear" onclick="clearEditor()">Clear</button>
    </div>

    <div id="nav-announcer" class="sr-only" aria-live="assertive"></div>
    <textarea id="editor" aria-label="Braille Editor" spellcheck="false" wrap="off"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const navAnnouncer = document.getElementById('nav-announcer');
        let lastLineIndex = -1;

        const brailleMap = {
            '1': '⠂', '2': '⠆', '3': '⠒', '4': '⠲', '5': '⠢',
            '6': '⠖', '7': '⠶', '8': '⠦', '9': '⠔', '0': '⠴'
        };

        function getBrailleGutter(index) {
            const numStr = (index + 1).toString();
            return numStr.split('').map(d => brailleMap[d]).join('');
        }

        function scaleBrailleFont() {
            const lines = editor.value.split('\n');
            const maxGutterLen = lines.length.toString().length;
            const totalCells = 40 + maxGutterLen;
            const style = window.getComputedStyle(editor);
            const padding = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
            const availableWidth = editor.clientWidth - padding;

            if (availableWidth > 0) {
                const fontSize = (availableWidth / totalCells) * 1.66; 
                editor.style.fontSize = fontSize + 'px';
            }
        }

        // Logic to ensure the gutter is present on the current line
        function ensureGutter() {
            const pos = editor.selectionStart;
            const lines = editor.value.split('\n');
            const lineIndex = editor.value.substring(0, pos).split('\n').length - 1;
            const currentLineText = lines[lineIndex];
            const gutter = getBrailleGutter(lineIndex);

            // If the line is empty or missing the technical digit prefix, inject it
            if (!currentLineText.startsWith(gutter)) {
                const before = lines.slice(0, lineIndex).join('\n');
                const after = lines.slice(lineIndex + 1).join('\n');
                
                // Prepend gutter to the current line content
                lines[lineIndex] = gutter + currentLineText.replace(/^[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]*/, '');
                
                const newContent = lines.join('\n');
                const diff = newContent.length - editor.value.length;
                
                editor.value = newContent;
                editor.setSelectionRange(pos + diff, pos + diff);
            }
        }

        editor.addEventListener('input', function(e) {
            // Handle simulated Enter key
            if (this.value.includes('Ê')) {
                this.value = this.value.replace(/Ê/g, '\n');
            }

            // If a newline was just added, ensure the next line gets a gutter immediately
            ensureGutter();
            
            localStorage.setItem('braille_editor_v1', this.value);
            scaleBrailleFont();
        });

        // Reflow is still useful for fixing bulk text or re-indexing after large deletes
        function manualReflow() {
            const startPos = editor.selectionStart;
            let rawLines = editor.value.split('\n').map(line => line.replace(/^[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]+/, ''));
            let rawContent = rawLines.join(' ').replace(/\s+/g, ' ').trim();

            let words = rawContent.split(' ');
            let wrappedLines = [];
            let currentLine = "";

            words.forEach(word => {
                if ((currentLine + word).length <= 40) {
                    currentLine += (currentLine === "" ? "" : " ") + word;
                } else {
                    wrappedLines.push(currentLine);
                    currentLine = word;
                }
            });
            if (currentLine) wrappedLines.push(currentLine);

            editor.value = wrappedLines.map((text, idx) => getBrailleGutter(idx) + text).join('\n');
            localStorage.setItem('braille_editor_v1', editor.value);
            
            window.requestAnimationFrame(() => {
                editor.focus();
                editor.setSelectionRange(startPos, startPos);
                scaleBrailleFont();
            });
        }

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) {
                const pos = editor.selectionStart;
                const currentLineIndex = editor.value.substring(0, pos).split('\n').length - 1;
                
                if (currentLineIndex !== lastLineIndex) {
                    editor.setAttribute('aria-label', `Line ${currentLineIndex + 1}`);
                    lastLineIndex = currentLineIndex;
                    // When moving to a new empty line via arrows/routing buttons, ensure gutter exists
                    ensureGutter();
                }
            }
        });

        window.onload = () => {
            const saved = localStorage.getItem('braille_editor_v1');
            if (saved) {
                editor.value = saved;
            } else {
                // Initialize first line with gutter
                editor.value = getBrailleGutter(0);
            }
            scaleBrailleFont();
            editor.focus();
        };

        async function copyToClipboard() {
            try {
                await navigator.clipboard.writeText(editor.value);
            } catch (err) {}
        }

        function clearEditor() {
            if (confirm("Clear document?")) {
                editor.value = getBrailleGutter(0);
                localStorage.removeItem('braille_editor_v1');
                lastLineIndex = 0;
                scaleBrailleFont();
                editor.focus();
            }
        }
    </script>
</body>
</html>
