<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille Editor - Ghost Gutter</title>
    <link rel="stylesheet" href="braille-editor.css">
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'SimBraille', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .editor-container {
            display: flex;
            width: 90vw;
            border: 2px solid #fff;
            margin-top: 20px;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        /* The Gutter: Non-editable, non-clickable */
        #gutter {
            background-color: #1a1a1a;
            color: #00ff00; /* Distinct color for visual dev */
            padding: 10px 5px;
            text-align: right;
            user-select: none;
            pointer-events: none;
            line-height: 1.5;
            border-right: 1px solid #444;
            white-space: pre;
        }

        /* The Textarea: Content only */
        #editor {
            flex-grow: 1;
            background: transparent;
            color: #fff;
            border: none;
            outline: none;
            padding: 10px;
            line-height: 1.5;
            resize: none;
            white-space: pre;
            overflow-x: hidden;
            overflow-y: scroll;
            width: 100%;
        }

        .controls { margin: 20px 0; display: flex; gap: 10px; }
        .sr-only { position: absolute; left: -10000px; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="copyToClipboard()">Copy Content Only</button>
        <button onclick="clearEditor()">Clear</button>
    </div>

    <div class="editor-container">
        <div id="gutter" aria-hidden="true">⠂</div>
        <textarea id="editor" spellcheck="false" wrap="off"></textarea>
    </div>

    <!-- Hidden announcer for Braille focus syncing -->
    <div id="braille-monitor" class="sr-only" aria-live="assertive"></div>

    <script>
        const editor = document.getElementById('editor');
        const gutter = document.getElementById('gutter');
        const brailleMonitor = document.getElementById('braille-monitor');

        const brailleMap = {
            '1': '⠂', '2': '⠆', '3': '⠒', '4': '⠲', '5': '⠢',
            '6': '⠖', '7': '⠶', '8': '⠦', '9': '⠔', '0': '⠴'
        };

        function getBrailleGutterText(index) {
            return (index + 1).toString().split('').map(d => brailleMap[d]).join('');
        }

        function syncGutter() {
            const lines = editor.value.split('\n');
            const gutterContent = lines.map((_, i) => getBrailleGutterText(i)).join('\n');
            gutter.textContent = gutterContent;
            
            // Adjust font size based on max gutter width + 40
            const maxDigits = lines.length.toString().length;
            const totalCells = 40 + maxDigits;
            const availableWidth = editor.clientWidth;
            const fontSize = (availableWidth / totalCells) * 1.5;
            
            editor.style.fontSize = fontSize + 'px';
            gutter.style.fontSize = fontSize + 'px';
        }

        // Handle the "Jump" logic and 40-cell wrap
        editor.addEventListener('input', (e) => {
            let content = editor.value;
            if (content.includes('Ê')) {
                content = content.replace(/Ê/g, '\n');
            }

            const lines = content.split('\n');
            let cursorMoved = false;

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].length > 40) {
                    const wrapAt = lines[i].lastIndexOf(' ', 40);
                    const actualBreak = wrapAt === -1 ? 40 : wrapAt;
                    
                    const currentLine = lines[i].substring(0, actualBreak);
                    const overflow = lines[i].substring(actualBreak).trimStart();
                    
                    lines[i] = currentLine;
                    if (lines[i + 1] !== undefined) {
                        lines[i + 1] = overflow + " " + lines[i + 1];
                    } else {
                        lines.push(overflow);
                    }
                    cursorMoved = true;
                }
            }

            editor.value = lines.join('\n');
            
            // If we wrapped, move cursor to the start of the new content
            if (cursorMoved) {
                const pos = editor.selectionStart;
                editor.setSelectionRange(pos, pos);
            }

            syncGutter();
            localStorage.setItem('braille_editor_v1', editor.value);
        });

        // Sync scrolling
        editor.addEventListener('scroll', () => {
            gutter.scrollTop = editor.scrollTop;
        });

        // Braille Display Sync: Update aria-label with the gutter digit
        function updateBrailleFocus() {
            const pos = editor.selectionStart;
            const lines = editor.value.substring(0, pos).split('\n');
            const currentLineIndex = lines.length - 1;
            const currentLineText = editor.value.split('\n')[currentLineIndex] || "";
            const gutterPrefix = getBrailleGutterText(currentLineIndex);

            // This ensures the Braille display "sees" the number at the start of the line
            editor.setAttribute('aria-label', `${gutterPrefix} ${currentLineText}`);
            
            // Force a tactile refresh
            brailleMonitor.textContent = `Line ${currentLineIndex + 1}`;
        }

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) {
                updateBrailleFocus();
            }
        });

        window.onload = () => {
            const saved = localStorage.getItem('braille_editor_v1');
            if (saved) editor.value = saved;
            syncGutter();
            editor.focus();
        };

        async function copyToClipboard() {
            try {
                // This ONLY copies the textarea, so line numbers are automatically excluded
                await navigator.clipboard.writeText(editor.value);
                alert("Content copied (without line numbers).");
            } catch (err) {}
        }

        function clearEditor() {
            if (confirm("Clear document?")) {
                editor.value = '';
                syncGutter();
                localStorage.removeItem('braille_editor_v1');
            }
        }
    </script>
</body>
</html>
