<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille Editor - Production Dual-Canvas</title>
    <style>
        html, body { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
        }
        body { 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
        }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; z-index: 10; }
        button { 
            padding: 10px 20px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #fff; 
            cursor: pointer; 
        }
        button:hover { background: #555; }

        /* The Visual Canvas Matrix (For sighted review/alignment) */
        #visualDisplay {
            width: 90vw;
            height: 70vh;
            background: #111;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px;
            font-family: 'SimBraille', monospace;
            font-size: 24px;
            line-height: 1.6;
            white-space: pre;
            overflow-x: hidden;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .visual-gutter { color: #00ffcc; }

        /* The Accessibility Engine Canvas */
        /* Offscreen to sighted eyes, but completely focused and active for VoiceOver/Braille */
        #hiddenEngine {
            position: absolute;
            left: -10000px;
            top: 0;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="copyCleanText()">Copy Content Only</button>
        <button onclick="clearEditor()">Clear All</button>
    </div>

    <!-- Sighted Monitor Layer -->
    <div id="visualDisplay"></div>
    
    <!-- True Operational Input Engine (VoiceOver & Braille Display Anchor) -->
    <textarea id="hiddenEngine" spellcheck="false" autocomplete="off" wrap="off"></textarea>

    <script>
        const hiddenEngine = document.getElementById('hiddenEngine');
        const visualDisplay = document.getElementById('visualDisplay');
        
        // Symmetrical Metadata Control Envelopes
        const STX = '\u0002';  // Left Anchor
        const ETX = '\u0003';  // Right Anchor
        const ZWSP = '\u200B'; // Soft Wrap Indicator
        
        const brailleMap = { '1':'⠂', '2':'⠆', '3':'⠒', '4':'⠲', '5':'⠢', '6':'⠖', '7':'⠶', '8':'⠦', '9':'⠔', '0':'⠴' };
        
        // Track raw paragraphs completely separated from the display metrics
        let masterParagraphs = [""]; 
        let activeLineIndex = 0; // The compiled line index where the cursor currently rests

        function getGutter(index) {
            const brailleDigits = (index + 1).toString().split('').map(d => brailleMap[d]).join('');
            return brailleDigits + ' '; // Space partitions Braille data from text for phonetic grouping
        }

        // Extracts pure data strings directly from compiled metadata grids
        function extractPureText(fullText) {
            let result = "";
            let i = 0;
            while (i < fullText.length) {
                if (fullText.charAt(i) === STX) {
                    let nextEtx = fullText.indexOf(ETX, i);
                    if (nextEtx !== -1) {
                        i = nextEtx + 1;
                        continue;
                    }
                }
                let char = fullText.charAt(i);
                if (char !== ZWSP) {
                    result += char;
                }
                i++;
            }
            return result;
        }

        // Compiles data structures down into the active tracking engine
        function compileLayout(isWordBoundary = false) {
            let compiledLines = [];
            let visualHTML = "";
            let rawEngineText = "";
            
            // Track the cursor translation mapping properties
            const currentSelectionStart = hiddenEngine.selectionStart;
            const engineLinesBefore = hiddenEngine.value.substring(0, currentSelectionStart).split('\n');
            const targetCompiledLineIdx = Math.max(0, engineLinesBefore.length - 1);
            
            let relativeCursorOffset = 0;
            const activeLineStartPos = hiddenEngine.value.lastIndexOf('\n', currentSelectionStart - 1) + 1;
            const activeLineETXIdx = hiddenEngine.value.indexOf(ETX, activeLineStartPos);
            if (activeLineETXIdx !== -1 && currentSelectionStart > activeLineETXIdx) {
                relativeCursorOffset = currentSelectionStart - (activeLineETXIdx + 1);
            }

            // Run the 40-cell dynamic text packaging loop across all paragraphs
            for (let p = 0; p < masterParagraphs.length; p++) {
                let segment = masterParagraphs[p];
                
                if (segment.length === 0) {
                    compiledLines.push({ content: "", isSoftWrapped: false });
                    continue;
                }

                while (segment.length > 0) {
                    if (segment.length <= 40) {
                        compiledLines.push({ content: segment, isSoftWrapped: false });
                        break;
                    } else {
                        let breakAt = segment.lastIndexOf(' ', 40);
                        if (breakAt === -1 && segment.length > 45) {
                            breakAt = 40;
                        }

                        if (breakAt !== -1 && (isWordBoundary || segment.length > 45)) {
                            let keep = segment.substring(0, breakAt);
                            let move = segment.substring(breakAt).trimStart();
                            compiledLines.push({ content: keep, isSoftWrapped: true });
                            segment = move;
                        } else {
                            compiledLines.push({ content: segment, isSoftWrapped: false });
                            break;
                        }
                    }
                }
            }

            // Build structural stream layers simultaneously
            let targetAbsoluteEngineCursor = -1;

            for (let i = 0; i < compiledLines.length; i++) {
                let item = compiledLines[i];
                let gutterText = STX + getGutter(i) + ETX;
                let lineStr = gutterText + item.content + (item.isSoftWrapped ? ZWSP : "");
                
                rawEngineText += lineStr;
                visualHTML += `<span class="visual-gutter">${gutterText}</span>${item.content}${item.isSoftWrapped ? ZWSP : ""}`;
                
                if (i === targetCompiledLineIdx) {
                    let safeOffset = Math.min(relativeCursorOffset, item.content.length);
                    targetAbsoluteEngineCursor = (rawEngineText.length - lineStr.length) + gutterText.length + safeOffset;
                }

                if (i < compiledLines.length - 1) {
                    rawEngineText += "\n";
                    visualHTML += "\n";
                }
            }

            // Push formatting to both layout canvases safely
            visualDisplay.innerHTML = visualHTML;
            
            if (hiddenEngine.value !== rawEngineText) {
                hiddenEngine.value = rawEngineText;
                if (targetAbsoluteEngineCursor !== -1) {
                    hiddenEngine.setSelectionRange(targetAbsoluteEngineCursor, targetAbsoluteEngineCursor);
                }
            }
            scaleFont();
        }

        // Maps the text state backward from input string directly into paragraph arrays
        function mapEngineToParagraphs() {
            const pureDoc = extractPureText(hiddenEngine.value);
            masterParagraphs = pureDoc.split('\n');
        }

        function scaleFont() {
            const totalCells = 40 + hiddenEngine.value.split('\n').length.toString().length + 3; 
            const fontSize = (visualDisplay.clientWidth / totalCells) * 0.92;
            visualDisplay.style.fontSize = fontSize + 'px';
        }

        // Rigid Focus Guard - Preserves right-side cell entry and blocks structural drops
        function runBoundaryEnforcement() {
            const pos = hiddenEngine.selectionStart;
            const lineStartPos = hiddenEngine.value.lastIndexOf('\n', pos - 1) + 1;
            const lineEndPos = hiddenEngine.value.indexOf('\n', pos);
            const lineStr = hiddenEngine.value.substring(lineStartPos, lineEndPos === -1 ? hiddenEngine.value.length : lineEndPos);
            
            const etxIdx = lineStr.indexOf(ETX);
            if (etxIdx !== -1) {
                const absoluteETXPos = lineStartPos + etxIdx;
                if (pos <= absoluteETXPos) {
                    const safeAnchor = absoluteETXPos + 1;
                    hiddenEngine.setSelectionRange(safeAnchor, safeAnchor);
                }
            }
        }

        // Native Typing Buffer Pass: Allowed to run freely without immediate variable rewrites
        hiddenEngine.addEventListener('input', (e) => {
            if (hiddenEngine.value.includes('Ê')) {
                const pos = hiddenEngine.selectionStart;
                hiddenEngine.value = hiddenEngine.value.replace(/Ê/g, '\n');
                hiddenEngine.setSelectionRange(pos, pos);
            }

            mapEngineToParagraphs();
            const isWordBoundary = e.data === ' ' || e.inputType === 'insertLineBreak';
            compileLayout(isWordBoundary);
            
            localStorage.setItem('braille_dual_canvas_v1', hiddenEngine.value);
            runBoundaryEnforcement();
        });

        // Strict Keydown Macro-Intercepts
        hiddenEngine.addEventListener('keydown', (e) => {
            const pos = hiddenEngine.selectionStart;
            const lineStartPos = hiddenEngine.value.lastIndexOf('\n', pos - 1) + 1;
            const lineEndPos = hiddenEngine.value.indexOf('\n', pos);
            const actualLineEnd = lineEndPos === -1 ? hiddenEngine.value.length : lineEndPos;
            const lineStr = hiddenEngine.value.substring(lineStartPos, actualLineEnd);
            const etxIdx = lineStr.indexOf(ETX);
            const absoluteETXPos = lineStartPos + etxIdx;

            if (e.key === 'Enter') {
                e.preventDefault(); // Lock browser layout engine mutations out
                
                const before = hiddenEngine.value.substring(0, pos);
                const after = hiddenEngine.value.substring(pos);
                const dummyGutter = "\n" + STX + getGutter(0) + ETX;
                
                hiddenEngine.value = before + dummyGutter + after;
                const nextTargetPos = pos + dummyGutter.length;
                hiddenEngine.setSelectionRange(nextTargetPos, nextTargetPos);
                
                mapEngineToParagraphs();
                compileLayout(true);
                return;
            }

            if (e.key === 'Backspace') {
                // If cursor hits Cell 1, intercept and merge the paragraphs manually
                if (pos === absoluteETXPos + 1) {
                    e.preventDefault();
                    if (lineStartPos === 0) return; // Top boundary reached

                    const targetLineEnd = lineStartPos - 1;
                    const targetLineStart = hiddenEngine.value.lastIndexOf('\n', targetLineEnd - 1) + 1;
                    const targetLineStr = hiddenEngine.value.substring(targetLineStart, targetLineEnd);
                    const targetETXIdx = targetLineStr.indexOf(ETX);
                    
                    let cleanTargetContent = targetETXIdx !== -1 ? targetLineStr.substring(targetETXIdx + 1) : targetLineStr;
                    if (cleanTargetContent.endsWith(ZWSP)) cleanTargetContent = cleanTargetContent.slice(0, -1);
                    
                    const currentContent = lineStr.substring(etxIdx + 1);
                    const targetGutter = targetETXIdx !== -1 ? targetLineStr.substring(0, targetETXIdx + 1) : (STX + getGutter(0) + ETX);
                    
                    const mergedLine = targetGutter + cleanTargetContent + currentContent;
                    const beforeBlock = hiddenEngine.value.substring(0, targetLineStart);
                    const afterBlock = hiddenEngine.value.substring(actualLineEnd);
                    
                    hiddenEngine.value = beforeBlock + mergedLine + afterBlock;
                    const landPos = targetLineStart + targetGutter.length + cleanTargetContent.length;
                    hiddenEngine.setSelectionRange(landPos, landPos);
                    
                    mapEngineToParagraphs();
                    compileLayout(false);
                }
                return;
            }

            // Directional Boundary Controls
            if (e.key === 'ArrowUp') {
                if (lineStartPos === 0) return;
                e.preventDefault();
                
                const targetLineEnd = lineStartPos - 1;
                const targetLineStart = hiddenEngine.value.lastIndexOf('\n', targetLineEnd - 1) + 1;
                const targetLineStr = hiddenEngine.value.substring(targetLineStart, targetLineEnd);
                
                const targetPos = targetLineStr.endsWith(ZWSP) ? (targetLineStart + targetLineStr.length - 1) : targetLineEnd;
                hiddenEngine.setSelectionRange(targetPos, targetPos);
                runBoundaryEnforcement();
                return;
            }

            if (e.key === 'ArrowRight') {
                if (pos === actualLineEnd || (hiddenEngine.value.charAt(pos) === '\n')) {
                    e.preventDefault();
                    const nextLineStart = actualLineEnd + 1;
                    const nextRightBracket = hiddenEngine.value.indexOf(ETX, nextLineStart);
                    if (nextRightBracket !== -1) {
                        const targetPos = nextRightBracket + 1;
                        hiddenEngine.setSelectionRange(targetPos, targetPos);
                    }
                }
                return;
            }

            if (e.key === 'ArrowLeft') {
                if (pos === absoluteETXPos + 1) {
                    e.preventDefault();
                    if (lineStartPos === 0) return;
                    
                    const targetLineEnd = lineStartPos - 1;
                    const targetLineStart = hiddenEngine.value.lastIndexOf('\n', targetLineEnd - 1) + 1;
                    const targetLineStr = hiddenEngine.value.substring(targetLineStart, targetLineEnd);
                    
                    const targetPos = targetLineStr.endsWith(ZWSP) ? (targetLineStart + targetLineStr.length - 1) : targetLineEnd;
                    hiddenEngine.setSelectionRange(targetPos, targetPos);
                }
                return;
            }
        });

        // Ensure user focus maps straight down to the engine during tracking tasks
        visualDisplay.addEventListener('click', () => { hiddenEngine.focus(); });
        document.addEventListener('click', () => { hiddenEngine.focus(); });
        
        hiddenEngine.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].includes(e.key)) {
                runBoundaryEnforcement();
            }
        });

        window.onload = () => {
            const saved = localStorage.getItem('braille_dual_canvas_v1');
            if (saved) {
                hiddenEngine.value = saved;
            } else {
                hiddenEngine.value = STX + getGutter(0) + ETX;
            }
            mapEngineToParagraphs();
            compileLayout(true);
            
            hiddenEngine.focus();
            const startPos = hiddenEngine.value.indexOf(ETX) + 1;
            hiddenEngine.setSelectionRange(startPos, startPos);
        };

        function copyCleanText() {
            const clean = extractPureText(hiddenEngine.value);
            navigator.clipboard.writeText(clean).then(() => { 
                alert("Clean text copied to clipboard!"); 
            });
        }

        function clearEditor() {
            if (confirm("Clear all contents?")) {
                localStorage.removeItem('braille_dual_canvas_v1');
                location.reload();
            }
        }
    </script>
</body>
</html>
