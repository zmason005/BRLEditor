<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille Editor - Token-First Stream</title>
    <style>
        html, body { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
        }
        body { 
            color: #fff; 
            font-family: 'SimBraille', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
        }
        #editor {
            width: 90vw;
            height: 70vh;
            background: #111;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px;
            font-size: 24px;
            line-height: 1.6;
            outline: none;
            resize: none;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button { 
            padding: 10px 20px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #fff; 
            cursor: pointer; 
            font-family: sans-serif;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="copyCleanText()">Copy Content Only</button>
        <button onclick="clearEditor()">Clear All</button>
    </div>

    <textarea id="editor" spellcheck="false" wrap="off"></textarea>

    <script>
        const editor = document.getElementById('editor');
        
        // Symmetrical Metadata Control Envelopes
        const STX = '\u0002';  // Left Anchor
        const ETX = '\u0003';  // Right Anchor
        const ZWSP = '\u200B'; // Soft Wrap Indicator
        
        const brailleMap = { '1':'⠂', '2':'⠆', '3':'⠒', '4':'⠲', '5':'⠢', '6':'⠖', '7':'⠶', '8':'⠦', '9':'⠔', '0':'⠴' };
        let isNavigating = false;

        function getGutter(index) {
            return (index + 1).toString().split('').map(d => brailleMap[d]).join('');
        }

        // Rigid Focus Guard - Prevents cursor from ever selecting or dropping behind metadata
        function realignCursor() {
            if (isNavigating) return;
            
            const pos = editor.selectionStart;
            const lineStartPos = editor.value.lastIndexOf('\n', pos - 1) + 1;
            const lineEndPos = editor.value.indexOf('\n', pos);
            const currentLineStr = editor.value.substring(lineStartPos, lineEndPos === -1 ? editor.value.length : lineEndPos);
            
            const rightBracketIdx = currentLineStr.indexOf(ETX);
            if (rightBracketIdx !== -1) {
                const absoluteRightBracketPos = lineStartPos + rightBracketIdx;
                if (pos <= absoluteRightBracketPos) {
                    const targetPos = absoluteRightBracketPos + 1;
                    editor.setSelectionRange(targetPos, targetPos);
                }
            }
        }

        function extractPureText(fullText) {
            // Token-First Slicing Engine: Erases all structural blocks regardless of \n presence
            let result = "";
            let i = 0;
            while (i < fullText.length) {
                if (fullText.charAt(i) === STX) {
                    let nextEtx = fullText.indexOf(ETX, i);
                    if (nextEtx !== -1) {
                        i = nextEtx + 1; // Leap entirely over the structural metadata block
                        continue;
                    }
                }
                let char = fullText.charAt(i);
                if (char !== ZWSP) { // Strip soft wraps for dynamic reflow compilation
                    result += char;
                }
                i++;
            }
            return result;
        }

        function processLayout(isWordBoundary = false) {
            const start = editor.selectionStart;
            const oldValue = editor.value;

            // Determine tracking coordinates of cursor relative to pure content boundaries
            const pureTextBeforeCursor = extractPureText(oldValue.substring(0, start));
            const paragraphsBefore = pureTextBeforeCursor.split('\n');
            const targetParagraphIdx = paragraphsBefore.length - 1;
            const targetCharOffset = paragraphsBefore[targetParagraphIdx].length;

            // Extract the overall text completely sanitized of metadata framework
            const masterPureContent = extractPureText(oldValue);
            const hardParagraphs = masterPureContent.split('\n');
            let structuralLines = [];

            // Execute Word Wrap Compilation based exclusively on raw text lengths
            for (let p = 0; p < hardParagraphs.length; p++) {
                let segment = hardParagraphs[p];
                if (segment.length === 0) {
                    structuralLines.push({ content: "", isSoftWrapped: false, srcParagraph: p, srcOffset: 0 });
                    continue;
                }

                let currentOffset = 0;
                while (segment.length > 0) {
                    if (segment.length <= 40) {
                        structuralLines.push({ content: segment, isSoftWrapped: false, srcParagraph: p, srcOffset: currentOffset });
                        break;
                    } else {
                        let breakAt = segment.lastIndexOf(' ', 40);
                        if (breakAt === -1 && segment.length > 45) {
                            breakAt = 40;
                        }

                        if (breakAt !== -1 && (isWordBoundary || segment.length > 45)) {
                            let keep = segment.substring(0, breakAt);
                            let move = segment.substring(breakAt).trimStart();
                            structuralLines.push({ content: keep, isSoftWrapped: true, srcParagraph: p, srcOffset: currentOffset });
                            currentOffset += keep.length + (segment.length - keep.length - move.length);
                            segment = move;
                        } else {
                            // Boundary threshold not fully committed; defer wrap cut
                            structuralLines.push({ content: segment, isSoftWrapped: false, srcParagraph: p, srcOffset: currentOffset });
                            break;
                        }
                    }
                }
            }

            // Reconstruct unified string mapping fresh layout matrices
            let newValue = "";
            let targetAbsolutePos = -1;

            for (let i = 0; i < structuralLines.length; i++) {
                let item = structuralLines[i];
                let gutterStr = STX + getGutter(i) + ETX;
                let lineOutput = gutterStr + item.content + (item.isSoftWrapped ? ZWSP : "");
                
                // Track where the selection index maps inside the reconstructed layout matrix
                if (targetAbsolutePos === -1 && item.srcParagraph === targetParagraphIdx) {
                    let nextItem = structuralLines[i + 1];
                    let nextOffset = nextItem ? nextItem.srcOffset : Infinity;
                    
                    if (targetCharOffset >= item.srcOffset && (targetCharOffset < nextOffset || item.srcParagraph !== (nextItem ? nextItem.srcParagraph : -1))) {
                        let localOffset = targetCharOffset - item.srcOffset;
                        let safeOffset = Math.min(localOffset, item.content.length);
                        targetAbsolutePos = newValue.length + gutterStr.length + safeOffset;
                    }
                }
                
                newValue += lineOutput;
                if (i < structuralLines.length - 1) {
                    newValue += "\n";
                }
            }

            // Safeguard bounds validation mapping
            if (targetAbsolutePos === -1) targetAbsolutePos = newValue.length;

            if (oldValue !== newValue) {
                editor.value = newValue;
                editor.setSelectionRange(targetAbsolutePos, targetAbsolutePos);
            } else {
                editor.setSelectionRange(start, start);
            }
            scaleFont();
        }

        function scaleFont() {
            const lines = editor.value.split('\n');
            const maxGutterSize = lines.length.toString().length;
            const totalCells = 40 + maxGutterSize + 2; 
            const fontSize = (editor.clientWidth / totalCells) * 0.92;
            editor.style.fontSize = fontSize + 'px';
        }

        editor.addEventListener('keydown', (e) => {
            const pos = editor.selectionStart;
            const lineStartPos = editor.value.lastIndexOf('\n', pos - 1) + 1;
            const lineEndPos = editor.value.indexOf('\n', pos);
            const currentLineStr = editor.value.substring(lineStartPos, lineEndPos === -1 ? editor.value.length : lineEndPos);
            const rightBracketIdx = currentLineStr.indexOf(ETX);
            const absoluteRightBracketPos = lineStartPos + rightBracketIdx;
            
            if (e.key === 'ArrowUp') {
                if (lineStartPos === 0) return;
                e.preventDefault();
                
                const targetLineEnd = lineStartPos - 1;
                const targetLineStart = editor.value.lastIndexOf('\n', targetLineEnd - 1) + 1;
                const targetLineStr = editor.value.substring(targetLineStart, targetLineEnd);
                
                if (targetLineStr.endsWith(ZWSP)) {
                    const targetPos = targetLineStart + targetLineStr.length - 1;
                    editor.setSelectionRange(targetPos, targetPos);
                } else {
                    editor.setSelectionRange(targetLineEnd, targetLineEnd);
                }
                return;
            }

            if (e.key === 'ArrowDown') {
                isNavigating = false;
                return;
            }

            if (e.key === 'ArrowRight') {
                if (pos === lineEndPos || (editor.value.charAt(pos) === '\n')) {
                    e.preventDefault();
                    const nextLineStart = (lineEndPos === -1 ? editor.value.length : lineEndPos) + 1;
                    const nextRightBracket = editor.value.indexOf(ETX, nextLineStart);
                    if (nextRightBracket !== -1) {
                        const targetPos = nextRightBracket + 1;
                        editor.setSelectionRange(targetPos, targetPos);
                    }
                }
                return;
            }

            if (e.key === 'ArrowLeft') {
                if (pos === absoluteRightBracketPos + 1) {
                    e.preventDefault();
                    if (lineStartPos === 0) return;
                    
                    const targetLineEnd = lineStartPos - 1;
                    const targetLineStart = editor.value.lastIndexOf('\n', targetLineEnd - 1) + 1;
                    const targetLineStr = editor.value.substring(targetLineStart, targetLineEnd);
                    
                    const targetPos = targetLineStr.endsWith(ZWSP) ? (targetLineStart + targetLineStr.length - 1) : targetLineEnd;
                    editor.setSelectionRange(targetPos, targetPos);
                }
                return;
            }

            if (e.key === 'Backspace') {
                if (pos === absoluteRightBracketPos + 1) {
                    e.preventDefault();
                    if (lineStartPos === 0) return;

                    // Manual Content Nexus Merging Pass
                    const currentContent = currentLineStr.substring(rightBracketIdx + 1);
                    const targetLineEnd = lineStartPos - 1;
                    const targetLineStart = editor.value.lastIndexOf('\n', targetLineEnd - 1) + 1;
                    let targetLineStr = editor.value.substring(targetLineStart, targetLineEnd);
                    
                    let targetContentIdx = targetLineStr.indexOf(ETX);
                    let cleanTargetContent = targetContentIdx !== -1 ? targetLineStr.substring(targetContentIdx + 1) : targetLineStr;
                    
                    if (cleanTargetContent.endsWith(ZWSP)) {
                        cleanTargetContent = cleanTargetContent.slice(0, -1);
                    }

                    const targetGutter = targetContentIdx !== -1 ? targetLineStr.substring(0, targetContentIdx + 1) : (STX + getGutter(0) + ETX);
                    const mergedLine = targetGutter + cleanTargetContent + currentContent;
                    
                    const beforeBlock = editor.value.substring(0, targetLineStart);
                    const afterBlock = editor.value.substring(lineEndPos === -1 ? editor.value.length : lineEndPos);
                    
                    editor.value = beforeBlock + mergedLine + afterBlock;
                    
                    const cursorAnchor = targetLineStart + targetGutter.length + cleanTargetContent.length;
                    editor.setSelectionRange(cursorAnchor, cursorAnchor);
                    
                    processLayout(false);
                }
            }
        });

        editor.addEventListener('input', (e) => {
            if (editor.value.includes('Ê')) {
                const pos = editor.selectionStart;
                editor.value = editor.value.replace(/Ê/g, '\n');
                editor.setSelectionRange(pos, pos);
            }

            const isWordBoundary = e.data === ' ' || e.inputType === 'insertLineBreak';
            
            processLayout(isWordBoundary);
            localStorage.setItem('braille_editor_v3_packets', editor.value);
            realignCursor();
        });

        editor.addEventListener('click', () => { 
            isNavigating = false;
            realignCursor(); 
        });
        
        editor.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].includes(e.key)) {
                realignCursor();
            }
        });

        window.onload = () => {
            const saved = localStorage.getItem('braille_editor_v3_packets');
            if (saved) {
                editor.value = saved;
            } else {
                editor.value = STX + getGutter(0) + ETX;
            }
            processLayout(true);
            editor.focus();
            
            const startPos = editor.value.indexOf(ETX) + 1;
            editor.setSelectionRange(startPos, startPos);
        };

        function copyCleanText() {
            const clean = extractPureText(editor.value);
            navigator.clipboard.writeText(clean).then(() => { 
                alert("Clean text copied to clipboard!"); 
            });
        }

        function clearEditor() {
            if (confirm("Clear all contents?")) {
                localStorage.removeItem('braille_editor_v3_packets');
                location.reload();
            }
        }
    </script>
</body>
</html>
