<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille Editor - Stabilized iOS Stream</title>
    <style>
        html, body { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
        }
        body { 
            color: #fff; 
            font-family: 'SimBraille', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
        }
        #editor {
            width: 90vw;
            height: 70vh;
            background: #111;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px;
            font-size: 24px;
            line-height: 1.6;
            outline: none;
            resize: none;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button { 
            padding: 10px 20px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #fff; 
            cursor: pointer; 
            font-family: sans-serif;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="copyCleanText()">Copy Content Only</button>
        <button onclick="clearEditor()">Clear All</button>
    </div>

    <textarea id="editor" spellcheck="false" wrap="off"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const brailleMap = { '1':'⠂', '2':'⠆', '3':'⠒', '4':'⠲', '5':'⠢', '6':'⠖', '7':'⠶', '8':'⠦', '9':'⠔', '0':'⠴' };
        
        let isNavigating = false;

        function getGutter(index) {
            return (index + 1).toString().split('').map(d => brailleMap[d]).join('');
        }

        function lockCursorPastGutter() {
            if (isNavigating) return;
            
            const pos = editor.selectionStart;
            const lineStartPos = editor.value.lastIndexOf('\n', pos - 1) + 1;
            const textBeforeCursor = editor.value.substring(0, pos);
            const currentLineIdx = textBeforeCursor.split('\n').length - 1;
            const gutterLength = getGutter(currentLineIdx).length;
            const relativePos = pos - lineStartPos;

            if (relativePos < gutterLength) {
                const targetPos = lineStartPos + gutterLength;
                editor.setSelectionRange(targetPos, targetPos);
            }
        }

        function processLayout(isWordBoundary = false, forcedNewlineIndex = null) {
            const start = editor.selectionStart;
            const oldValue = editor.value;

            // Track where the cursor sits relatively inside its line block before changes occur
            const linesBefore = oldValue.substring(0, start).split('\n');
            const currentLineIdx = linesBefore.length - 1;
            const currentLineStart = oldValue.lastIndexOf('\n', start - 1) + 1;
            const currentGutterLen = getGutter(currentLineIdx).length;
            const relativeCharOffset = Math.max(0, (start - currentLineStart) - currentGutterLen);

            // Step 1: Isolate active content lines & clean out any migrated internal gutters
            let rawLines = oldValue.split('\n');
            let lines = rawLines.map((line, idx) => {
                // Remove initial line gutter matching this index
                let gutter = getGutter(idx);
                if (line.startsWith(gutter)) {
                    line = line.substring(gutter.length);
                } else {
                    // Backspace migration fix: clean up any old initial gutters from front
                    line = line.replace(/^[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]+/, '');
                }
                // Global gutter cleanup: Erase any embedded line numbers stuck inside due to line merges
                return line.replace(/[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]+/g, (match) => {
                    // Verify if match corresponds to an artifact pattern
                    return ''; 
                });
            });

            // If a manual line break was requested, preserve its slot explicitly in the logic map
            if (forcedNewlineIndex !== null && forcedNewlineIndex === currentLineIdx) {
                // Ensure a line separation exists
            }

            // Step 2: Adaptive Auto-Wrap Flow Logic
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].length > 40) {
                    let breakAt = lines[i].lastIndexOf(' ', 40);
                    
                    if (breakAt === -1 && lines[i].length > 45) {
                        breakAt = 40; 
                    }

                    if (breakAt !== -1 && (isWordBoundary || lines[i].length > 45)) {
                        let keep = lines[i].substring(0, breakAt);
                        let move = lines[i].substring(breakAt).trimStart();
                        
                        lines[i] = keep;
                        if (lines[i+1] !== undefined) {
                            lines[i+1] = move + (lines[i+1].startsWith(' ') || move.endsWith(' ') ? "" : " ") + lines[i+1].trimStart();
                        } else {
                            lines.push(move);
                        }
                    }
                }
            }

            // Step 3: Rebuild with newly calculated line indexes applied cleanly
            const newValue = lines.map((content, idx) => getGutter(idx) + content).join('\n');

            if (oldValue !== newValue) {
                editor.value = newValue;
                
                // Track relative coordinate to exact structural lines match
                const targetLines = newValue.split('\n');
                let targetAbsolutePos = 0;
                
                for (let i = 0; i < targetLines.length; i++) {
                    if (i === currentLineIdx) {
                        const targetGutterLen = getGutter(i).length;
                        const safeOffset = Math.min(relativeCharOffset, targetLines[i].length - targetGutterLen);
                        targetAbsolutePos += targetGutterLen + safeOffset;
                        break;
                    } else {
                        targetAbsolutePos += targetLines[i].length + 1;
                    }
                }
                editor.setSelectionRange(targetAbsolutePos, targetAbsolutePos);
            } else {
                editor.setSelectionRange(start, start);
            }
            scaleFont();
        }

        function scaleFont() {
            const lines = editor.value.split('\n');
            const maxGutterSize = lines.length.toString().length;
            const totalCells = 40 + maxGutterSize;
            const fontSize = (editor.clientWidth / totalCells) * 0.92;
            editor.style.fontSize = fontSize + 'px';
        }

        editor.addEventListener('keydown', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].includes(e.key)) {
                isNavigating = true;
                return;
            } 
            isNavigating = false;

            const pos = editor.selectionStart;
            const lineStartPos = editor.value.lastIndexOf('\n', pos - 1) + 1;
            const relativePos = pos - lineStartPos;
            const currentLineIdx = editor.value.substring(0, pos).split('\n').length - 1;
            const gutterLen = getGutter(currentLineIdx).length;

            if (e.key === 'Backspace') {
                if (relativePos === gutterLen) {
                    if (currentLineIdx === 0) {
                        e.preventDefault();
                    } else {
                        // Allow natural merging, the input/layout pass clean loop deletes the structural remnant
                        isNavigating = false; 
                    }
                } else if (relativePos < gutterLen) {
                    e.preventDefault();
                }
            }
        });

        editor.addEventListener('input', (e) => {
            let forcedNewlineIdx = null;
            
            if (editor.value.includes('Ê')) {
                const pos = editor.selectionStart;
                forcedNewlineIdx = editor.value.substring(0, pos).split('\n').length - 1;
                editor.value = editor.value.replace(/Ê/g, '\n');
                editor.setSelectionRange(pos, pos);
            }

            if (e.inputType === 'insertLineBreak') {
                const pos = editor.selectionStart;
                forcedNewlineIdx = editor.value.substring(0, pos).split('\n').length - 2; 
            }

            const isWordBoundary = e.data === ' ' || e.inputType === 'insertLineBreak';
            
            processLayout(isWordBoundary, forcedNewlineIdx);
            localStorage.setItem('braille_editor_v1', editor.value);
            lockCursorPastGutter();
        });

        editor.addEventListener('click', () => { 
            isNavigating = false;
            lockCursorPastGutter(); 
        });
        
        editor.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home'].includes(e.key)) {
                lockCursorPastGutter();
            }
        });

        window.onload = () => {
            const saved = localStorage.getItem('braille_editor_v1');
            editor.value = saved ? saved : getGutter(0);
            processLayout(true);
            editor.focus();
            
            const startPos = getGutter(0).length;
            editor.setSelectionRange(startPos, startPos);
        };

        function copyCleanText() {
            const clean = editor.value.split('\n')
                .map((line, idx) => {
                    const gutterLen = getGutter(idx).length;
                    // Safely get pure text after layout check
                    if (line.startsWith(getGutter(idx))) {
                        return line.substring(gutterLen);
                    }
                    return line.replace(/^[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]+/, '');
                })
                .join('\n');
            navigator.clipboard.writeText(clean).then(() => { 
                alert("Clean text copied to clipboard!"); 
            });
        }

        function clearEditor() {
            if (confirm("Clear all?")) {
                localStorage.removeItem('braille_editor_v1');
                location.reload();
            }
        }
    </script>
</body>
</html>
