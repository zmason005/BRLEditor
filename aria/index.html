<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille Editor - Guarded In-Stream</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'SimBraille', monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
        }
        #editor {
            width: 95vw;
            height: 75vh;
            background: #111;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px;
            font-size: 24px;
            line-height: 1.6;
            outline: none;
            resize: none;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button { 
            padding: 10px 20px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #fff; 
            cursor: pointer; 
            font-family: sans-serif;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="copyCleanText()">Copy Content Only</button>
        <button onclick="clearEditor()">Clear All</button>
    </div>

    <textarea id="editor" spellcheck="false" wrap="off"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const brailleMap = { '1':'⠂', '2':'⠆', '3':'⠒', '4':'⠲', '5':'⠢', '6':'⠖', '7':'⠶', '8':'⠦', '9':'⠔', '0':'⠴' };

        function getGutter(index) {
            return (index + 1).toString().split('').map(d => brailleMap[d]).join('');
        }

        function refreshNumbers() {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            
            let lines = editor.value.split('\n');
            let newLines = lines.map((line, i) => {
                // Strip existing braille numbers from the start of the line
                let clean = line.replace(/^[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]+/, '');
                return getGutter(i) + clean;
            });

            const newValue = newLines.join('\n');
            
            // Only update the value if it has actually changed to prevent cursor jitter
            if (editor.value !== newValue) {
                editor.value = newValue;
                editor.setSelectionRange(start, end);
            }
            scaleFont();
        }

        function scaleFont() {
            const lines = editor.value.split('\n');
            const maxGutter = lines.length.toString().length;
            const totalCells = 40 + maxGutter;
            // Adjusts font size so 40 cells + gutter always fit the screen width
            const fontSize = (editor.clientWidth / totalCells) * 0.95;
            editor.style.fontSize = fontSize + 'px';
        }

        function enforceGhostZone() {
            const pos = editor.selectionStart;
            const lineStartPos = editor.value.lastIndexOf('\n', pos - 1) + 1;
            const textBefore = editor.value.substring(0, pos);
            const linesBefore = textBefore.split('\n');
            const currentLineIdx = linesBefore.length - 1;
            const gutter = getGutter(currentLineIdx);
            
            const relativePos = pos - lineStartPos;

            // If cursor is inside the gutter, snap it to the start of the content area
            if (relativePos < gutter.length) {
                const newPos = lineStartPos + gutter.length;
                editor.setSelectionRange(newPos, newPos);
            }
        }

        editor.addEventListener('keydown', (e) => {
            const pos = editor.selectionStart;
            const lineStartPos = editor.value.lastIndexOf('\n', pos - 1) + 1;
            const linesBefore = editor.value.substring(0, pos).split('\n');
            const currentLineIdx = linesBefore.length - 1;
            const gutter = getGutter(currentLineIdx);
            const relativePos = pos - lineStartPos;

            // Handle Backspace at the boundary to prevent deleting the gutter
            if (e.key === 'Backspace' && relativePos <= gutter.length) {
                if (currentLineIdx === 0 || relativePos < gutter.length) {
                    e.preventDefault();
                }
                // Allowed if relativePos === gutter.length to allow merging with previous line
            }
        });

        editor.addEventListener('input', (e) => {
            // Simulated Enter support
            if (editor.value.includes('Ê')) {
                const pos = editor.selectionStart;
                editor.value = editor.value.replace(/Ê/g, '\n');
                editor.setSelectionRange(pos, pos);
            }

            // 40-character wrapping logic
            let lines = editor.value.split('\n');
            let changed = false;

            for (let i = 0; i < lines.length; i++) {
                let gutter = getGutter(i);
                let content = lines[i].replace(/^[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]+/, '');
                
                if (content.length > 40) {
                    let breakAt = content.lastIndexOf(' ', 40);
                    if (breakAt === -1) breakAt = 40;

                    let keep = content.substring(0, breakAt);
                    let move = content.substring(breakAt).trimStart();

                    lines[i] = gutter + keep;
                    if (lines[i+1] !== undefined) {
                        let nextContent = lines[i+1].replace(/^[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]+/, '');
                        lines[i+1] = move + " " + nextContent;
                    } else {
                        lines.push(move);
                    }
                    changed = true;
                }
            }

            if (changed) {
                const start = editor.selectionStart;
                editor.value = lines.join('\n');
                editor.setSelectionRange(start, start);
            }
            
            refreshNumbers();
            localStorage.setItem('braille_editor_v1', editor.value);
        });

        // Ensure clicking or navigating doesn't land in the line number zone
        editor.addEventListener('click', () => {
            setTimeout(enforceGhostZone, 10);
        });
        
        editor.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home'].includes(e.key)) {
                enforceGhostZone();
            }
        });

        window.onload = () => {
            const saved = localStorage.getItem('braille_editor_v1');
            if (saved) {
                editor.value = saved;
            } else {
                editor.value = getGutter(0);
            }
            refreshNumbers();
            editor.focus();
            // Start cursor after the first gutter
            const startPos = getGutter(0).length;
            editor.setSelectionRange(startPos, startPos);
        };

        function copyCleanText() {
            const clean = editor.value.split('\n')
                .map(line => line.replace(/^[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]+/, ''))
                .join('\n');
            navigator.clipboard.writeText(clean).then(() => {
                alert("Clean text copied to clipboard!");
            });
        }

        function clearEditor() {
            if (confirm("Clear all?")) {
                localStorage.removeItem('braille_editor_v1');
                editor.value = getGutter(0);
                refreshNumbers();
                const startPos = getGutter(0).length;
                editor.setSelectionRange(startPos, startPos);
                editor.focus();
            }
        }
    </script>
</body>
</html>
