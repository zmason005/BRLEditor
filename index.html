<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braille BRF Editor - Locked Margin Mode</title>
    <style>
        @font-face {
            font-family: 'SimBraille';
            src: url('SimBraille.ttf') format('truetype');
        }

        body { 
            font-family: -apple-system, sans-serif; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            background-color: #000000;
            color: #ffffff;
        }
        
        .controls { margin: 15px 0; flex-shrink: 0; }
        
        button {
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            border-radius: 4px;
            border: 1px solid #ffffff;
            margin-bottom: 5px;
        }

        .btn-copy { background-color: #0056b3; color: white; }
        .btn-format { background-color: #28a745; color: white; border-color: #1e7e34; }

        textarea { 
            flex-grow: 1; 
            width: 100%;
            max-width: 45ch; 
            font-family: 'SimBraille', 'Courier New', monospace; 
            font-size: 1.25rem;
            padding: 15px;
            border: 2px solid #ffffff;
            box-sizing: border-box;
            line-height: 1.4;
            white-space: pre;
            overflow-x: auto;
            resize: none;
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h2>Braille Editor (Locked Margin)</h2>
    <p>Margins are locked. Use <strong>Clean for Export</strong> to remove numbers and preserve spacing.</p>

    <div class="controls">
        <button class="btn-copy" onclick="copyToClipboard()">Copy to Clipboard</button>
        <button class="btn-format" onclick="cleanForExport()">Clean for Export</button>
        <button onclick="clearEditor()">Clear</button>
    </div>

    <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const MARGIN_SIZE = 5; // # + 3 digits + space
        const WALL = '\u2060'; 
        const BRAILLE_BLANK = '\u2800'; 

        window.onload = () => {
            const saved = localStorage.getItem('braille_margin_v1');
            if (saved) {
                editor.value = saved;
            } else {
                editor.value = toBrailleNumber(1);
            }
            editor.focus();
            enforceGuard();
        };

        function toBrailleNumber(num) {
            const map = { '1':'a', '2':'b', '3':'c', '4':'d', '5':'e', '6':'f', '7':'g', '8':'h', '9':'i', '0':'j' };
            const digits = num.toString().padStart(3, '0').split('').map(d => map[d]).join('');
            return '#' + digits + ' '; 
        }

        function enforceGuard() {
            const pos = editor.selectionStart;
            const text = editor.value;
            const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
            const relativePos = pos - lineStart;

            if (relativePos < MARGIN_SIZE) {
                editor.setSelectionRange(lineStart + MARGIN_SIZE, lineStart + MARGIN_SIZE);
            }
        }

        // Use selectionchange for robust cursor locking in Safari
        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) enforceGuard();
        });

        editor.addEventListener('keydown', (e) => {
            const pos = editor.selectionStart;
            const text = editor.value;
            const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
            const relativePos = pos - lineStart;

            // Block backspacing into the number
            if (e.key === 'Backspace' && relativePos <= MARGIN_SIZE) {
                e.preventDefault();
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                const before = text.substring(0, pos);
                const after = text.substring(pos);
                
                // We will renumber the whole document after inserting
                const tempText = before + '\n' + after;
                editor.value = tempText;
                
                // Renumber and restore cursor
                renumberLines(pos + 1 + MARGIN_SIZE);
            }
        });

        function renumberLines(targetCursor = null) {
            const cursor = targetCursor !== null ? targetCursor : editor.selectionStart;
            const lines = editor.value.split('\n');
            
            const updated = lines.map((line, i) => {
                // Remove existing #xxx prefix if present
                const content = line.replace(/^#[a-j]{3} /, "");
                return toBrailleNumber(i + 1) + content;
            });

            editor.value = updated.join('\n');
            editor.setSelectionRange(cursor, cursor);
            localStorage.setItem('braille_margin_v1', editor.value);
        }

        function cleanForExport() {
            const lines = editor.value.split('\n');
            const cleaned = lines.map(line => {
                let content = line.replace(/^#[a-j]{3} /, "");
                
                // Prevent iPhone from deleting empty lines
                if (content.length === 0) return BRAILLE_BLANK;
                
                // Prevent iPhone from collapsing spaces (center-alignment fix)
                return content.replace(/  /g, ' ' + BRAILLE_BLANK);
            }).join('\n');

            editor.value = cleaned;
            localStorage.setItem('braille_margin_v1', editor.value);
            alert("Cleaned! Margin removed and spaces preserved.");
        }

        async function copyToClipboard() {
            try {
                await navigator.clipboard.writeText(editor.value);
                alert("Copied!");
            } catch (err) {}
        }

        function clearEditor() {
            if(confirm("Clear document?")) {
                editor.value = toBrailleNumber(1);
                localStorage.removeItem('braille_margin_v1');
                editor.focus();
            }
        }

        // Save on every input
        editor.addEventListener('input', () => {
            localStorage.setItem('braille_margin_v1', editor.value);
        });
    </script>
</body>
</html>
