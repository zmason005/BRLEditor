<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braille Editor - Locked Margin</title>
    <style>
        @font-face {
            font-family: 'SimBraille';
            src: url('SimBraille.ttf') format('truetype');
        }

        body { 
            font-family: -apple-system, sans-serif; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            background-color: #000000;
            color: #ffffff;
        }
        
        .controls { margin: 15px 0; flex-shrink: 0; }
        
        button {
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            border-radius: 4px;
            border: 1px solid #ffffff;
        }

        .btn-copy { background-color: #0056b3; color: white; }
        .btn-format { background-color: #28a745; color: white; }

        textarea { 
            flex-grow: 1; 
            width: 100%;
            max-width: 45ch; 
            font-family: 'SimBraille', 'Courier New', monospace; 
            font-size: 1.25rem;
            padding: 15px;
            border: 2px solid #ffffff;
            box-sizing: border-box;
            line-height: 1.4;
            white-space: pre;
            overflow-x: auto;
            resize: none;
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h2>Braille Editor</h2>
    <p>First 5 cells are locked line numbers (#aaa ).</p>

    <div class="controls">
        <button class="btn-copy" onclick="copyToClipboard()">Copy to Clipboard</button>
        <button class="btn-format" onclick="cleanForExport()">Remove Line Numbers</button>
        <button onclick="clearEditor()">Clear</button>
    </div>

    <textarea id="editor" spellcheck="false" autocomplete="off"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const MARGIN_SIZE = 5; // #aaa plus one space

        window.onload = () => {
            const saved = localStorage.getItem('braille_margin_simple');
            editor.value = saved || toBrailleNumber(1);
            editor.focus();
        };

        function toBrailleNumber(num) {
            const map = { '1':'a', '2':'b', '3':'c', '4':'d', '5':'e', '6':'f', '7':'g', '8':'h', '9':'i', '0':'j' };
            const digits = num.toString().padStart(3, '0').split('').map(d => map[d]).join('');
            return '#' + digits + ' '; 
        }

        // The Guard: If cursor is in the margin, move it to the start of text
        function enforceGuard() {
            const pos = editor.selectionStart;
            const text = editor.value;
            const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
            const relativePos = pos - lineStart;

            if (relativePos < MARGIN_SIZE) {
                const newPos = lineStart + MARGIN_SIZE;
                editor.setSelectionRange(newPos, newPos);
            }
        }

        // Keep the cursor out of the numbers
        editor.addEventListener('mouseup', enforceGuard);
        editor.addEventListener('keyup', (e) => {
            if (e.key.includes('Arrow')) enforceGuard();
        });

        editor.addEventListener('keydown', (e) => {
            const pos = editor.selectionStart;
            const text = editor.value;
            const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
            const relativePos = pos - lineStart;

            // Stop backspace from deleting the number
            if (e.key === 'Backspace' && relativePos <= MARGIN_SIZE) {
                e.preventDefault();
                return;
            }

            // Handle New Line
            if (e.key === 'Enter') {
                e.preventDefault();
                const before = text.substring(0, pos);
                const after = text.substring(pos);
                
                // Insert newline and a placeholder for the next number
                editor.value = before + '\n' + after;
                
                // Immediately renumber everything so the new line gets its ID
                renumberAll(pos + 1 + MARGIN_SIZE);
            }
        });

        function renumberAll(targetPos = null) {
            const currentPos = targetPos !== null ? targetPos : editor.selectionStart;
            const lines = editor.value.split('\n');
            
            const processed = lines.map((line, i) => {
                // Strip any existing Braille number prefix (#xxx )
                const cleanContent = line.replace(/^#[a-j]{3} /, "");
                return toBrailleNumber(i + 1) + cleanContent;
            });

            editor.value = processed.join('\n');
            editor.setSelectionRange(currentPos, currentPos);
            localStorage.setItem('braille_margin_simple', editor.value);
        }

        function cleanForExport() {
            const lines = editor.value.split('\n');
            // Simply remove the first 5 characters of every line
            const exported = lines.map(line => line.substring(MARGIN_SIZE)).join('\n');
            editor.value = exported;
            localStorage.setItem('braille_margin_simple', editor.value);
            alert("Line numbers removed.");
        }

        function copyToClipboard() {
            editor.select();
            document.execCommand('copy');
            alert("Copied!");
        }

        function clearEditor() {
            if(confirm("Clear?")) {
                editor.value = toBrailleNumber(1);
                localStorage.removeItem('braille_margin_simple');
            }
        }

        // Save progress while typing
        editor.addEventListener('input', () => {
            localStorage.setItem('braille_margin_simple', editor.value);
        });
    </script>
</body>
</html>
