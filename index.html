<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braille BRF Editor - Locked Margin Mode</title>
    <style>
        @font-face {
            font-family: 'SimBraille';
            src: url('SimBraille.ttf') format('truetype');
        }

        body { 
            font-family: -apple-system, sans-serif; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            background-color: #000000;
            color: #ffffff;
        }
        
        .controls { margin: 15px 0; flex-shrink: 0; }
        
        button {
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            border-radius: 4px;
            border: 1px solid #ffffff;
        }

        .btn-copy { background-color: #0056b3; color: white; }
        .btn-format { background-color: #d9534f; color: white; border-color: #d43f3a; }

        textarea { 
            flex-grow: 1; 
            width: 100%;
            max-width: 44ch; /* 4 chars for margin + 40 for text */
            font-family: 'SimBraille', 'Courier New', monospace; 
            font-size: 1.25rem;
            padding: 15px;
            border: 2px solid #ffffff;
            box-sizing: border-box;
            line-height: 1.4;
            white-space: pre;
            overflow-x: auto;
            resize: none;
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h2>Braille Editor (Locked Margin)</h2>
    <p>The first 4 cells are locked. Use <strong>Clean for Export</strong> to remove numbers before copying.</p>

    <div class="controls">
        <button class="btn-copy" onclick="copyToClipboard()">Copy to Clipboard</button>
        <button class="btn-format" onclick="cleanForExport()">Clean for Export</button>
        <button onclick="clearEditor()">Clear</button>
    </div>

    <textarea id="editor" spellcheck="false"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const MARGIN_SIZE = 4; // 3 digits + 1 space
        const WALL = '\u2060'; // Word Joiner (Invisible wall)

        window.onload = () => {
            const saved = localStorage.getItem('braille_margin_v1');
            editor.value = saved || generateLine(1);
            editor.focus();
            enforceGuard();
        };

        function toBrailleNumber(num) {
            const map = { '1':'a', '2':'b', '3':'c', '4':'d', '5':'e', '6':'f', '7':'g', '8':'h', '9':'i', '0':'j' };
            const digits = num.toString().padStart(3, '0').split('').map(d => map[d]).join('');
            return '#' + digits + WALL + ' '; 
        }

        function generateLine(lineNum) {
            return toBrailleNumber(lineNum);
        }

        // Snap cursor forward if it tries to enter the margin
        function enforceGuard() {
            const pos = editor.selectionStart;
            const text = editor.value;
            const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
            const relativePos = pos - lineStart;

            if (relativePos < MARGIN_SIZE) {
                editor.selectionStart = editor.selectionEnd = lineStart + MARGIN_SIZE;
            }
        }

        editor.addEventListener('click', enforceGuard);
        editor.addEventListener('keyup', enforceGuard);

        editor.addEventListener('keydown', (e) => {
            const pos = editor.selectionStart;
            const text = editor.value;
            const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
            const relativePos = pos - lineStart;

            // Prevent backspacing into the margin
            if (e.key === 'Backspace' && relativePos <= MARGIN_SIZE) {
                e.preventDefault();
            }

            // Handle Enter key: Insert a new line with a new number
            if (e.key === 'Enter') {
                e.preventDefault();
                const lines = text.split('\n');
                const currentLineIdx = text.substring(0, pos).split('\n').length;
                const newNum = toBrailleNumber(currentLineIdx + 1);
                
                const before = text.substring(0, pos);
                const after = text.substring(pos);
                
                editor.value = before + '\n' + newNum + after;
                editor.selectionStart = editor.selectionEnd = pos + 1 + MARGIN_SIZE;
                renumberLines();
            }
        });

        function renumberLines() {
            const lines = editor.value.split('\n');
            const updated = lines.map((line, i) => {
                const clean = line.substring(MARGIN_SIZE);
                return toBrailleNumber(i + 1) + clean;
            });
            const cursor = editor.selectionStart;
            editor.value = updated.join('\n');
            editor.selectionStart = editor.selectionEnd = cursor;
            localStorage.setItem('braille_margin_v1', editor.value);
        }

        function cleanForExport() {
            const lines = editor.value.split('\n');
            // Remove the first 4 characters (the margin) from every line
            const cleaned = lines.map(line => line.substring(MARGIN_SIZE)).join('\n');
            editor.value = cleaned;
            localStorage.setItem('braille_margin_v1', editor.value);
            alert("Line numbers removed. You can now copy the text.");
        }

        async function copyToClipboard() {
            try {
                await navigator.clipboard.writeText(editor.value);
                alert("Copied!");
            } catch (err) {}
        }

        function clearEditor() {
            if(confirm("Clear?")) {
                editor.value = toBrailleNumber(1);
                localStorage.removeItem('braille_margin_v1');
            }
        }
    </script>
</body>
</html>
