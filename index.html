<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braille BRF Editor - Standard Mode</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        
        .top-section { flex-shrink: 0; }
        .controls { margin: 15px 0; }
        
        button {
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .btn-copy { background-color: #0056b3; color: white; }
        .btn-clear { background-color: #f5f5f5; color: #333; }
        .btn-format { background-color: #28a745; color: white; border-color: #1e7e34; }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        textarea { 
            flex-grow: 1; 
            width: 100%;
            max-width: 40ch; 
            font-family: 'Courier New', monospace; 
            font-size: 1.25rem;
            padding: 15px;
            border: 2px solid #333;
            box-sizing: border-box;
            line-height: 1.4;
            white-space: pre;
            overflow-x: auto;
            resize: none;
        }
    </style>
</head>
<body>

    <div class="top-section">
        <h2>Client BRF Editor</h2>
        <p>Type your draft. Use <strong>Ê</strong> for new lines. Use <strong>Format for BRF</strong> to finalize page numbering.</p>
    </div>

    <div class="controls">
        <button class="btn-copy" onclick="copyToClipboard()">Copy to Clipboard</button>
        <button class="btn-format" onclick="formatForBRF()">Format for BRF</button>
        <button class="btn-clear" onclick="clearEditor()">Clear Document</button>
    </div>

    <div id="aria-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <label for="editor" class="sr-only">Braille Editor, 40 cells per line</label>
    
    <textarea id="editor" aria-label="Braille Editor, 40 cells per line" spellcheck="false"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const announcer = document.getElementById('aria-announcer');
        let lastLineNumber = -1; 

        window.onload = () => {
            const savedText = localStorage.getItem('braille_editor_v1');
            if (savedText) {
                editor.value = savedText;
                editor.selectionStart = editor.selectionEnd = editor.value.length;
            }
            editor.focus();
        };

        // Helper: Convert number to Braille ASCII digits (# + a-j)
        function toBrailleNumber(num) {
            const map = { '1':'a', '2':'b', '3':'c', '4':'d', '5':'e', '6':'f', '7':'g', '8':'h', '9':'i', '0':'j' };
            const digits = num.toString().split('').map(d => map[d]).join('');
            return '#' + digits;
        }

        function formatForBRF() {
            // Split by existing newlines to respect manual formatting
            let inputLines = editor.value.split('\n');
            let finalLines = [];
            let pageCount = 1;

            inputLines.forEach((line) => {
                // Remove any previous formatting artifacts (page numbers)
                let cleanLine = line.replace(/ {3,}#[a-j]+/g, '');

                // Loop to handle wrapping if a single line is > 40 characters
                // We also check if we need to start a new page
                while (cleanLine.length > 0 || (cleanLine === "" && (finalLines.length + 1) % 25 === 0)) {
                    let isPageEnd = (finalLines.length + 1) % 25 === 0;
                    let pNum = isPageEnd ? toBrailleNumber(pageCount) : "";
                    let limit = isPageEnd ? (40 - (pNum.length + 3)) : 40;

                    let segment = "";

                    if (cleanLine.length <= limit) {
                        segment = cleanLine;
                        cleanLine = "";
                    } else {
                        // Find the last space within the allowed limit for word wrap
                        let lastSpace = cleanLine.lastIndexOf(' ', limit);
                        if (lastSpace === -1) {
                            // No space found; force break at limit
                            segment = cleanLine.substring(0, limit);
                            cleanLine = cleanLine.substring(limit);
                        } else {
                            segment = cleanLine.substring(0, lastSpace);
                            cleanLine = cleanLine.substring(lastSpace + 1);
                        }
                    }

                    if (isPageEnd) {
                        // Calculate right-alignment with at least 3 spaces
                        let spacesNeeded = 40 - segment.length - pNum.length;
                        finalLines.push(segment + " ".repeat(Math.max(3, spacesNeeded)) + pNum);
                        pageCount++;
                    } else {
                        finalLines.push(segment);
                    }

                    if (cleanLine === "") break;
                }
            });

            editor.value = finalLines.join('\n');
            announcer.textContent = `Formatted: ${pageCount} pages.`;
            localStorage.setItem('braille_editor_v1', editor.value);
            editor.focus();
        }

        function handleNavigation() {
            const text = editor.value;
            const pos = editor.selectionStart;
            const lines = text.split('\n');
            let currentLineIndex = text.substring(0, pos).split('\n').length - 1;
            
            if (currentLineIndex !== lastLineNumber) {
                const lineLength = (lines[currentLineIndex] || "").length;
                announcer.textContent = `Line ${currentLineIndex + 1}, ${lineLength} characters`;
                lastLineNumber = currentLineIndex;
            }
        }

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) handleNavigation();
        });

        editor.addEventListener('input', function() {
            // Handle the Braille "Enter" replacement
            if (this.value.includes('Ê')) {
                const start = this.selectionStart;
                this.value = this.value.replace(/Ê/g, '\n');
                this.selectionStart = this.selectionEnd = start;
            }
            localStorage.setItem('braille_editor_v1', this.value);
        });

        async function copyToClipboard() {
            if (!editor.value) return;
            try {
                // Clipboard API preserves \n characters accurately
                await navigator.clipboard.writeText(editor.value);
                announcer.textContent = "Text copied to clipboard.";
            } catch (err) {
                announcer.textContent = "Copy failed.";
            }
        }

        function clearEditor() {
            if (confirm("Delete saved progress and clear document?")) {
                editor.value = '';
                localStorage.removeItem('braille_editor_v1');
                announcer.textContent = "Document cleared.";
                editor.focus();
            }
        }
    </script>
</body>
</html>
