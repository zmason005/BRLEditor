<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRF Editor - Finalized Layout</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        
        .top-section { flex-shrink: 0; }
        
        .controls { margin: 15px 0; }
        
        button {
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .btn-download { background-color: #2e7d32; color: white; }
        .btn-clear { background-color: #f5f5f5; color: #333; }

        .status-bar {
            background: #eee;
            padding: 10px;
            border: 1px solid #333;
            border-bottom: none;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        /* The Editor at the bottom */
        textarea { 
            flex-grow: 1; /* Makes the box fill the remaining screen space */
            width: 100%; 
            font-family: 'Courier New', monospace; 
            font-size: 1.25rem;
            padding: 15px;
            border: 1px solid #333;
            box-sizing: border-box;
            line-height: 1.4;
        }

        .warning { color: #d32f2f; display: none; }
    </style>
</head>
<body>

    <div class="top-section">
        <h2>Client BRF Editor</h2>
        <p>Type in ASCII. Use <strong>Ê (Dots 1-2-6)</strong> for a new line.</p>
    </div>

    <div class="controls">
        <button class="btn-download" onclick="downloadBRF()">Download .brf</button>
        <button class="btn-clear" onclick="clearEditor()">Clear</button>
    </div>

    <div class="status-bar">
        <div id="counter">Length: 0</div>
        <div id="limit-msg" class="warning">LINE TOO LONG (40+)</div>
    </div>

    <textarea id="editor" spellcheck="false" placeholder="Start typing..."></textarea>

    <script>
        const editor = document.getElementById('editor');
        const counter = document.getElementById('counter');
        const warning = document.getElementById('limit-msg');

        // Handle the Ê key trigger and update UI
        editor.addEventListener('input', function() {
            if (this.value.includes('Ê')) {
                const start = this.selectionStart;
                this.value = this.value.replace(/Ê/g, '\n');
                this.selectionStart = this.selectionEnd = start;
            }
            
            // Calculate current line length
            const lines = this.value.split('\n');
            const currentLineLength = lines[lines.length - 1].length;
            
            counter.innerText = `Length: ${currentLineLength}`;
            warning.style.display = (currentLineLength > 40) ? 'block' : 'none';
        });

        function downloadBRF() {
            if (!editor.value) return;
            // Standardize line endings for Braille hardware (\r\n)
            const blob = new Blob([editor.value.replace(/\n/g, '\r\n')], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "client_file.brf";
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearEditor() {
            if (confirm("Clear document?")) {
                editor.value = '';
                counter.innerText = "Length: 0";
                editor.focus();
            }
        }

        // Ensure focus is in the editor on load
        window.onload = () => editor.focus();
    </script>
</body>
</html>
