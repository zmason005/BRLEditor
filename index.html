<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille BRF Editor - Standard Mode</title>
    <link rel="stylesheet" href="braille-editor.css">
    <style>
        /* CSS Overrides to enforce the 90% no-scroll rule */
        body {
            overflow-x: hidden;
            width: 100vw;
        }

        #editor {
            width: 90vw !important;
            margin: 0 auto !important;
            display: block;
            overflow-x: hidden !important; 
            white-space: pre;
            word-wrap: normal; 
            box-sizing: border-box;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="top-section">
        <h2>Client BRF Editor</h2>
        <p>Type your draft. Use <strong>Format for BRF</strong> to normalize line lengths.</p>
    </div>

    <div class="controls">
        <button class="btn-copy" onclick="copyToClipboard()">Copy to Clipboard</button>
        <button class="btn-format" onclick="formatForBRF()">Format for BRF</button>
        <button class="btn-clear" onclick="clearEditor()">Clear Document</button>
    </div>

    <div id="nav-announcer" class="sr-only" aria-live="assertive" aria-atomic="true" aria-hidden="true"></div>

    <label for="editor" class="sr-only">Braille Editor, 40 cells per line</label>
    
    <textarea id="editor" aria-label="Braille Editor, 40 cells per line" spellcheck="false" wrap="off"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const navAnnouncer = document.getElementById('nav-announcer');
        let lastLineIndex = -1;

        // Dynamic Font Scaling: Ensures 40 characters always fit the 90vw width
        function scaleBrailleFont() {
            const style = window.getComputedStyle(editor);
            const padding = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
            const availableWidth = editor.clientWidth - padding;

            if (availableWidth > 0) {
                const fontSize = (availableWidth / 40) * 1.66; 
                editor.style.fontSize = fontSize + 'px';
            }
        }

        // BRAILLE SYNC: Forces iOS Braille driver to re-scan the cursor position
        function refreshBrailleFocus() {
            if (document.activeElement === editor) {
                const selection = editor.selectionStart;
                
                // Toggle ARIA to 'ping' the Bluetooth Braille driver
                editor.setAttribute('aria-live', 'polite');
                
                window.requestAnimationFrame(() => {
                    editor.setSelectionRange(selection, selection);
                    // Update label to reflect current line for screen reader tracking
                    editor.setAttribute('aria-label', `Braille Editor, line ${lastLineIndex + 1}`);
                });
            }
        }

        window.onload = () => {
            const savedText = localStorage.getItem('braille_editor_v1');
            if (savedText) {
                editor.value = savedText;
                editor.selectionStart = editor.selectionEnd = editor.value.length;
            }
            scaleBrailleFont();
            editor.focus();
        };

        window.addEventListener('resize', scaleBrailleFont);

        function applyWordWrap(text) {
            const lines = text.split('\n');
            const wrapped = [];
            for (let line of lines) {
                while (line.length > 40) {
                    let breakAt = line.lastIndexOf(' ', 39);
                    if (breakAt <= 0) {
                        wrapped.push(line.substring(0, 40));
                        line = line.substring(40);
                    } else {
                        wrapped.push(line.substring(0, breakAt));
                        line = line.substring(breakAt).replace(/^ +/, '');
                    }
                }
                wrapped.push(line);
            }
            return wrapped.join('\n');
        }

        function announceLine(lineIndex, lines) {
            const lineNumber = lineIndex + 1;
            const charCount = (lines[lineIndex] || "").length;
            const message = `Line ${lineNumber}, ${charCount} characters`;

            navAnnouncer.textContent = message;
            // Briefly clear it to allow re-announcement
            setTimeout(() => { navAnnouncer.textContent = ''; }, 2000);
        }

        function checkLineChange() {
            const text = editor.value;
            const pos = editor.selectionStart;
            const lines = text.split('\n');
            const currentLineIndex = text.substring(0, pos).split('\n').length - 1;

            if (currentLineIndex !== lastLineIndex) {
                announceLine(currentLineIndex, lines);
                lastLineIndex = currentLineIndex;
            }
        }

        // Listen for cursor movements from Braille routing buttons
        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) {
                checkLineChange();
                refreshBrailleFocus();
            }
        });

        function formatForBRF() {
            let inputLines = editor.value.split('\n');
            let finalLines = [];
            const startPos = editor.selectionStart;

            inputLines.forEach((line) => {
                let cleanLine = line.replace(/\s{2,}#[a-j]+/g, '').trimEnd();
                if (cleanLine === "") {
                    finalLines.push("");
                    return;
                }
                while (cleanLine.length > 0) {
                    if (cleanLine.length <= 40) {
                        finalLines.push(cleanLine);
                        cleanLine = "";
                    } else {
                        let lastSpace = cleanLine.lastIndexOf(' ', 40);
                        if (lastSpace === -1) {
                            finalLines.push(cleanLine.substring(0, 40));
                            cleanLine = cleanLine.substring(40);
                        } else {
                            finalLines.push(cleanLine.substring(0, lastSpace));
                            cleanLine = cleanLine.substring(lastSpace).trimStart();
                        }
                    }
                }
            });

            editor.value = finalLines.join('\n');
            localStorage.setItem('braille_editor_v1', editor.value);
            
            window.requestAnimationFrame(() => {
                editor.focus();
                editor.setSelectionRange(startPos, startPos);
                scaleBrailleFont();
                refreshBrailleFocus();
            });
        }

        editor.addEventListener('input', function() {
            const start = this.selectionStart;

            if (this.value.includes('Ê')) {
                this.value = this.value.replace(/Ê/g, '\n');
                const newPos = this.value.indexOf('\n', Math.max(0, start - 2)) + 1;
                this.selectionStart = this.selectionEnd = newPos;
            }

            const before = this.value;
            const wrapped = applyWordWrap(before);

            if (wrapped !== before) {
                const cursor = this.selectionStart;
                this.value = wrapped;
                const addedNewlines = (wrapped.substring(0, cursor + 5).split('\n').length) -
                                      (before.substring(0, cursor + 5).split('\n').length);
                this.selectionStart = this.selectionEnd = cursor + addedNewlines;
            }

            localStorage.setItem('braille_editor_v1', this.value);
            refreshBrailleFocus();
        });

        async function copyToClipboard() {
            if (!editor.value) return;
            try {
                await navigator.clipboard.writeText(editor.value);
            } catch (err) {}
        }

        function clearEditor() {
            if (confirm("Delete saved progress and clear document?")) {
                editor.value = '';
                localStorage.removeItem('braille_editor_v1');
                editor.focus();
                refreshBrailleFocus();
            }
        }
    </script>
</body>
</html>
