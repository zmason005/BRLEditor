<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille BRF Editor - Standard Mode</title>
    <style>
        @font-face {
            font-family: 'SimBraille';
            src: url('SimBraille.ttf') format('truetype');
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #000000;
            color: #ffffff;
            box-sizing: border-box;
        }
        
        .top-section { flex-shrink: 0; padding-bottom: 10px; }
        .controls { 
            margin-bottom: 15px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
        }
        
        button {
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #ffffff;
            font-size: 0.9rem;
        }

        .btn-copy { background-color: #0056b3; color: white; }
        .btn-clear { background-color: #333333; color: #ffffff; }
        .btn-format { background-color: #28a745; color: white; border-color: #1e7e34; }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        textarea { 
            flex-grow: 1; 
            width: 100%;
            /* The math: 100vw divided by ~42-45 characters ensures 
               40 characters + padding always stay in view.
            */
            font-size: min(1.5rem, 2.2vw); 
            font-family: 'SimBraille', 'Courier New', monospace; 
            padding: 10px;
            border: 2px solid #ffffff;
            box-sizing: border-box;
            line-height: 1.2;
            white-space: pre;
            overflow-x: hidden; /* Prevent horizontal scroll */
            resize: none;
            background-color: #000000;
            color: #ffffff;
        }

        /* Mobile specific font override */
        @media (max-width: 600px) {
            textarea {
                font-size: 2.3vw; /* Larger ratio for small screens */
                padding: 5px;
            }
            body { padding: 5px; }
        }
    </style>
</head>
<body>

    <div class="top-section">
        <h2 style="margin: 5px 0;">Client BRF Editor</h2>
        <p style="margin: 5px 0; font-size: 0.9rem;">Use <strong>Ê</strong> for new lines. 40 cells per line.</p>
    </div>

    <div class="controls">
        <button class="btn-copy" onclick="copyToClipboard()">Copy</button>
        <button class="btn-format" onclick="formatForBRF()">Format BRF</button>
        <button class="btn-clear" onclick="clearEditor()">Clear</button>
    </div>

    <div id="nav-announcer" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

    <label for="editor" class="sr-only">Braille Editor, 40 cells per line</label>
    
    <textarea id="editor" aria-label="Braille Editor, 40 cells per line" spellcheck="false" wrap="off"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const navAnnouncer = document.getElementById('nav-announcer');
        let lastLineIndex = -1;

        window.onload = () => {
            const savedText = localStorage.getItem('braille_editor_v1');
            if (savedText) {
                editor.value = savedText;
            }
            editor.focus();
        };

        function toBrailleNumber(num) {
            const map = { '1':'a', '2':'b', '3':'c', '4':'d', '5':'e', '6':'f', '7':'g', '8':'h', '9':'i', '0':'j' };
            const digits = num.toString().split('').map(d => map[d]).join('');
            return '#' + digits;
        }

        function applyWordWrap(text) {
            const lines = text.split('\n');
            const wrapped = [];
            for (let line of lines) {
                while (line.length > 40) {
                    let breakAt = line.lastIndexOf(' ', 39);
                    if (breakAt <= 0) {
                        wrapped.push(line.substring(0, 40));
                        line = line.substring(40);
                    } else {
                        wrapped.push(line.substring(0, breakAt));
                        line = line.substring(breakAt).replace(/^ +/, '');
                    }
                }
                wrapped.push(line);
            }
            return wrapped.join('\n');
        }

        function announceLine(lineIndex, lines) {
            const lineNumber = lineIndex + 1;
            const charCount = (lines[lineIndex] || "").length;
            navAnnouncer.textContent = `Line ${lineNumber}, ${charCount} cells`;
        }

        function checkLineChange() {
            const text = editor.value;
            const pos = editor.selectionStart;
            const lines = text.split('\n');
            const currentLineIndex = text.substring(0, pos).split('\n').length - 1;

            if (currentLineIndex !== lastLineIndex) {
                announceLine(currentLineIndex, lines);
                lastLineIndex = currentLineIndex;
            }
        }

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) checkLineChange();
        });

        function formatForBRF() {
            let inputLines = editor.value.split('\n');
            let finalLines = [];
            let pageCount = 1;

            inputLines.forEach((line) => {
                let cleanLine = line.replace(/ {3,}#[a-j]+/g, '');
                if (cleanLine.length === 0 && finalLines.length > 0) return;

                while (cleanLine.length > 0 || (cleanLine === "" && (finalLines.length + 1) % 25 === 0)) {
                    let isPageEnd = (finalLines.length + 1) % 25 === 0;
                    let pNum = isPageEnd ? toBrailleNumber(pageCount) : "";
                    let limit = isPageEnd ? (40 - (pNum.length + 3)) : 40;
                    let segment = "";

                    if (cleanLine.length <= limit) {
                        segment = cleanLine;
                        cleanLine = "";
                    } else {
                        let lastSpace = cleanLine.lastIndexOf(' ', limit);
                        if (lastSpace === -1) {
                            segment = cleanLine.substring(0, limit);
                            cleanLine = cleanLine.substring(limit);
                        } else {
                            segment = cleanLine.substring(0, lastSpace);
                            cleanLine = cleanLine.substring(lastSpace + 1);
                        }
                    }

                    if (isPageEnd) {
                        let spacesNeeded = 40 - segment.length - pNum.length;
                        finalLines.push(segment + " ".repeat(Math.max(3, spacesNeeded)) + pNum);
                        pageCount++;
                    } else {
                        finalLines.push(segment);
                    }
                    if (cleanLine === "") break;
                }
            });

            editor.value = finalLines.join('\n');
            localStorage.setItem('braille_editor_v1', editor.value);
        }

        editor.addEventListener('input', function() {
            const start = this.selectionStart;
            if (this.value.includes('Ê')) {
                this.value = this.value.replace(/Ê/g, '\n');
                this.selectionStart = this.selectionEnd = start;
            }
            const wrapped = applyWordWrap(this.value);
            if (wrapped !== this.value) {
                this.value = wrapped;
                this.selectionStart = this.selectionEnd = start;
            }
            localStorage.setItem('braille_editor_v1', this.value);
        });

        async function copyToClipboard() {
            try {
                await navigator.clipboard.writeText(editor.value);
                alert("Copied to clipboard");
            } catch (err) {
                console.error(err);
            }
        }

        function clearEditor() {
            if (confirm("Clear all text?")) {
                editor.value = '';
                localStorage.removeItem('braille_editor_v1');
            }
        }
    </script>
</body>
</html>
