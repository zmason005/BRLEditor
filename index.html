<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BRF Editor - Solution 3 (JS Auto-Wrap)</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; display: flex; flex-direction: column; height: 90vh; }
        textarea { flex-grow: 1; width: 100%; font-family: 'Courier New', monospace; font-size: 1.25rem; padding: 15px; border: 1px solid #333; line-height: 1.4; }
        .status-bar { background: #eee; padding: 10px; border: 1px solid #333; border-bottom: none; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Braille Editor (JS Auto-Wrap)</h2>
    <div class="status-bar" id="counter">Current Line: 0/40</div>
    <textarea id="editor" spellcheck="false" placeholder="Type past 40 to see auto-wrap..."></textarea>

    <script>
        const editor = document.getElementById('editor');
        const counter = document.getElementById('counter');

        editor.addEventListener('input', function(e) {
            // Handle your manual newline shortcut
            if (this.value.includes('Ê')) {
                this.value = this.value.replace(/Ê/g, '\n');
            }

            let lines = this.value.split('\n');
            let cursorPosition = this.selectionStart;
            let modified = false;

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].length > 40) {
                    const extra = lines[i].substring(40);
                    lines[i] = lines[i].substring(0, 40);
                    lines.splice(i + 1, 0, extra);
                    cursorPosition++; // Adjust cursor for the new newline
                    modified = true;
                }
            }

            if (modified) {
                this.value = lines.join('\n');
                this.selectionStart = this.selectionEnd = cursorPosition;
            }

            // Update display counter for the current line
            const currentLine = this.value.substring(0, this.selectionStart).split('\n').length - 1;
            counter.innerText = `Current Line Length: ${lines[currentLine].length}/40`;
        });
    </script>
</body>
</html>
