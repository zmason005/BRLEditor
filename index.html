<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Braille Editor</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 20px auto; display: flex; flex-direction: column; height: 95vh; }
        
        /* Solution 1: Visual 40-cell width */
        textarea { 
            flex-grow: 1; 
            width: 40ch; 
            font-family: 'Courier New', monospace; 
            font-size: 1.25rem;
            padding: 15px;
            line-height: 1.4;
            white-space: pre; /* Keeps spaces and prevents auto-wrap */
            overflow-x: auto;
            resize: none;
        }

        .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
    </style>
</head>
<body>

    <div id="aria-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <textarea id="editor" aria-label="Braille Editor" spellcheck="false"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const announcer = document.getElementById('aria-announcer');
        let lastLineNumber = -1; 

        function handleNavigation() {
            const text = editor.value;
            const pos = editor.selectionStart;
            const lines = text.split('\n');
            let currentLineIndex = text.substring(0, pos).split('\n').length - 1;
            
            if (currentLineIndex !== lastLineNumber) {
                const lineLength = lines[currentLineIndex].length;
                announcer.textContent = `Line ${currentLineIndex + 1}, ${lineLength} characters`;
                lastLineNumber = currentLineIndex;
            }
        }

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) handleNavigation();
        });

        editor.addEventListener('input', function() {
            if (this.value.includes('Ê')) {
                const start = this.selectionStart;
                this.value = this.value.replace(/Ê/g, '\n');
                this.selectionStart = this.selectionEnd = start;
            }
        });

        window.onload = () => editor.focus();
    </script>
</body>
</html>
