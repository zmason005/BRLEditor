<div id="aria-announcer" 
     aria-live="polite" 
     aria-atomic="true"
     style="position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0);">
</div>

<script>
    const editor = document.getElementById('editor');
    const announcer = document.getElementById('aria-announcer');
    
    // This variable acts as the "gatekeeper"
    let lastLineNumber = -1; 

    function handleNavigation() {
        const text = editor.value;
        const cursorSelection = editor.selectionStart;
        const lines = text.split('\n');
        
        // Calculate the current line index (0-based)
        let currentLineIndex = text.substring(0, cursorSelection).split('\n').length - 1;
        
        // ONLY trigger if the line index is DIFFERENT than the last time we checked
        if (currentLineIndex !== lastLineNumber) {
            const lineLength = lines[currentLineIndex].length;
            const displayLineNumber = currentLineIndex + 1;

            // Trigger the verbal announcement
            announcer.textContent = `Line ${displayLineNumber}, ${lineLength} characters`;
            
            // Update the gatekeeper so it knows we've already announced this line
            lastLineNumber = currentLineIndex;
        }
    }

    // selectionchange covers all navigation (Arrows, Home/End, PageUp/Down, Clicks)
    document.addEventListener('selectionchange', () => {
        if (document.activeElement === editor) {
            handleNavigation();
        }
    });

    // Handle your manual newline shortcut
    editor.addEventListener('input', function() {
        if (this.value.includes('Ê')) {
            const start = this.selectionStart;
            this.value = this.value.replace(/Ê/g, '\n');
            this.selectionStart = this.selectionEnd = start;
        }
    });

    // ... (rest of your download and clear functions)
</script>
