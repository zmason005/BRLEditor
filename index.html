<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional BRF Editor</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 0 20px;
            color: #333;
        }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        
        textarea { 
            width: 100%; 
            height: 450px; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 1.3rem;
            padding: 15px;
            border: 2px solid #222;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #fdfdfd;
            line-height: 1.5;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f0f0;
            padding: 10px 15px;
            margin-top: -2px;
            border: 2px solid #222;
            border-top: none;
            font-weight: bold;
        }

        .controls { margin-top: 20px; display: flex; gap: 10px; }
        
        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            border: none;
        }

        .btn-download { background-color: #2e7d32; color: white; }
        .btn-download:hover { background-color: #1b5e20; }
        
        .btn-clear { background-color: #d32f2f; color: white; }
        .btn-clear:hover { background-color: #b71c1c; }

        .warning { color: #d32f2f; visibility: hidden; }
        
        .instructions { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BRF Document Editor</h1>
        <p class="instructions">
            Type in Computer Braille (ASCII). Use <strong>Ê (Dots 1-2-6)</strong> to start a new line. 
            Standard lines should not exceed 40 characters.
        </p>
    </div>

    <textarea id="editor" spellcheck="false" placeholder="Start typing..."></textarea>
    
    <div class="status-bar">
        <div id="counter">Line Length: 0</div>
        <div id="limit-msg" class="warning">⚠️ LINE EXCEEDS 40 CHARACTERS</div>
    </div>

    <div class="controls">
        <button class="btn-download" onclick="downloadBRF()">Download .brf File</button>
        <button class="btn-clear" onclick="clearEditor()">Clear Editor</button>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const counter = document.getElementById('counter');
        const warning = document.getElementById('limit-msg');

        // 1. Monitor typing for the 'Ê' (Dots 1-2-6) trigger
        editor.addEventListener('input', function() {
            if (this.value.includes('Ê')) {
                const start = this.selectionStart;
                const end = this.selectionEnd;

                // Replace 'Ê' with a real newline
                this.value = this.value.replace(/Ê/g, '\n');

                // Keep cursor at the new position
                this.selectionStart = this.selectionEnd = start;
            }
            updateUI();
        });

        // 2. Handle the visual line counter
        function updateUI() {
            const lines = editor.value.split('\n');
            const currentLine = lines[lines.length - 1];
            const length = currentLine.length;
            
            counter.innerText = `Line Length: ${length}`;
            
            if (length > 40) {
                warning.style.visibility = 'visible';
            } else {
                warning.style.visibility = 'hidden';
            }
        }

        // 3. Download the BRF file
        function downloadBRF() {
            const content = editor.value;
            if (!content) {
                alert("The editor is empty!");
                return;
            }

            // Ensure Windows-style line endings (\r\n) for hardware compatibility
            const brfReadyText = content.replace(/\n/g, '\r\n');
            
            const blob = new Blob([brfReadyText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "braille_document.brf";
            document.body.appendChild(a);
            a.click();
            
            // Clean up
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function clearEditor() {
            if (confirm("Are you sure you want to clear the editor?")) {
                editor.value = '';
                updateUI();
            }
        }
    </script>
</body>
</html>
