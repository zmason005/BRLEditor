<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Stylus Braille Editor</title>
    <style>
        @font-face {
            font-family: 'SimBraille';
            src: url('SimBrl.ttf') format('truetype');
        }

        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f4f4f9;
        }

        h1 { color: #333; }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* Editor Styling */
        #editor {
            width: 100%;
            height: 200px;
            font-family: 'SimBraille', sans-serif;
            font-size: 24px;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px solid #333;
            background: white;
            white-space: pre-wrap;
            overflow-y: auto;
        }

        /* Read-Only Slate Section */
        #slate-view {
            width: 100%;
            height: 200px;
            font-family: 'SimBraille', sans-serif;
            font-size: 24px;
            padding: 10px;
            border: 2px solid #666;
            background: #e9e9e9;
            white-space: pre-wrap;
            direction: rtl; /* Right to Left */
            overflow-y: auto;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        button:hover { background-color: #0056b3; }
        
        .label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>D-Stylus Braille Editor</h1>
        
        <span class="label">Editor (Reading Mode - LTR):</span>
        <div id="editor" contenteditable="true" spellcheck="false"></div>

        <button onclick="activateSlateView()">Generate Slate View</button>

        <span class="label">Slate View (Writing Mode - RTL & Mirrored):</span>
        <div id="slate-view" readonly></div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const slateView = document.getElementById('slate-view');

        let currentChord = new Set();
        let keysDown = new Set();
        const brailleKeys = ['f', 'd', 's', 'j', 'k', 'l'];

        // 1. CHORDED INPUT LOGIC
        editor.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            if (brailleKeys.includes(key)) {
                e.preventDefault();
                currentChord.add(key);
                keysDown.add(key);
            } else if (key === ' ') {
                e.preventDefault();
                insertBraille('\u2800');
            } else if (key === 'enter') {
                e.preventDefault();
                insertBraille('\n');
            }
            // Backspace is allowed to behave naturally
        });

        editor.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            
            if (brailleKeys.includes(key)) {
                keysDown.delete(key);

                // Fire character only when ALL keys are released
                if (keysDown.size === 0 && currentChord.size > 0) {
                    const char = calculateBraille(currentChord);
                    insertBraille(char);
                    currentChord.clear();
                }
            }
        });

        function calculateBraille(chord) {
            let val = 0;
            if (chord.has('f')) val |= 0x01; // Dot 1
            if (chord.has('d')) val |= 0x02; // Dot 2
            if (chord.has('s')) val |= 0x04; // Dot 3
            if (chord.has('j')) val |= 0x08; // Dot 4
            if (chord.has('k')) val |= 0x10; // Dot 5
            if (chord.has('l')) val |= 0x20; // Dot 6
            return String.fromCharCode(0x2800 + val);
        }

        function insertBraille(char) {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            selection.deleteFromDocument();
            selection.getRangeAt(0).insertNode(document.createTextNode(char));
            selection.collapseToEnd();
            handleWordWrap();
        }

        // 2. WORD WRAP LOGIC (40 Cells)
        function handleWordWrap() {
            const lines = editor.innerText.split('\n');
            let lastLine = lines[lines.length - 1];

            if (lastLine.length > 40) {
                const lastSpaceIndex = lastLine.lastIndexOf('\u2800');
                if (lastSpaceIndex !== -1) {
                    // Move the last word to a new line
                    const before = editor.innerText.substring(0, editor.innerText.length - (lastLine.length - lastSpaceIndex));
                    const after = editor.innerText.substring(editor.innerText.length - (lastLine.length - lastSpaceIndex - 1));
                    editor.innerText = before + '\n' + after;
                } else {
                    // Hard break if no space
                    editor.innerText = editor.innerText.slice(0, -1) + '\n' + editor.innerText.slice(-1);
                }
                // Reset cursor to end
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(editor);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        // 3. SLATE MIRRORING LOGIC
        function flipCell(char) {
            let code = char.charCodeAt(0) - 0x2800;
            if (code < 0 || code > 255) return char;

            let flipped = 0;
            if (code & 0x01) flipped |= 0x08; // 1 -> 4
            if (code & 0x02) flipped |= 0x10; // 2 -> 5
            if (code & 0x04) flipped |= 0x20; // 3 -> 6
            if (code & 0x08) flipped |= 0x01; // 4 -> 1
            if (code & 0x10) flipped |= 0x02; // 5 -> 2
            if (code & 0x20) flipped |= 0x04; // 6 -> 3
            return String.fromCharCode(0x2800 + flipped);
        }

        function activateSlateView() {
            const text = editor.innerText;
            const lines = text.split('\n');
            
            const processedLines = lines.map(line => {
                // Flip each character then reverse the whole line
                return line.split('').map(flipCell).reverse().join('');
            });

            slateView.innerText = processedLines.join('\n');
        }
    </script>
</body>
</html>
