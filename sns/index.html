<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Stylus Braille Editor - 40 Cell Lock</title>
    <style>
        @font-face {
            font-family: 'SimBraille';
            src: url('main/SimBraille.ttf') format('truetype');
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center; /* Center the "Book" on the screen */
        }

        header {
            width: 100%;
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        .book-container {
            display: flex;
            justify-content: center; /* Keeps pages together */
            flex: 1;
            width: auto;
            max-width: 100%;
            padding: 20px;
        }

        section {
            display: flex;
            flex-direction: column;
            /* Lock width to 40 characters + small padding */
            width: 42ch; 
            box-sizing: border-box;
        }

        #editor-region {
            border-right: 2px solid #fff; /* The white line divider */
            padding-right: 20px;
        }

        #translation-region {
            padding-left: 20px;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 8px;
            text-align: center;
        }

        #editor, #slate-view {
            height: 400px;
            background-color: #000;
            color: #fff;
            font-family: 'SimBraille', monospace;
            font-size: 28px;
            line-height: 1.4;
            padding: 10px;
            border: 1px solid #333;
            outline: none;
            overflow-y: auto;
            overflow-x: hidden; /* Prevent horizontal scroll */
            white-space: pre;    /* Strict character positioning */
        }

        #slate-view {
            direction: rtl; 
            background-color: #050505;
        }

        .toolbar {
            width: 100%;
            padding: 20px;
            background: #111;
            display: flex;
            justify-content: center;
            border-top: 1px solid #444;
        }

        button {
            padding: 12px 30px;
            background-color: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover { background-color: #ccc; }
    </style>
</head>
<body>

    <header>
        <h1>D-Stylus Braille Editor</h1>
    </header>

    <div class="book-container">
        <!-- Editor Region -->
        <section id="editor-region" aria-label="editor">
            <span class="label">Reading View (LTR)</span>
            <div id="editor" contenteditable="true" spellcheck="false" autofocus></div>
        </section>

        <!-- Translation Region -->
        <section id="translation-region" aria-label="translation">
            <span class="label">Slate View (RTL & Mirrored)</span>
            <div id="slate-view"></div>
        </section>
    </div>

    <div class="toolbar">
        <button onclick="activateSlateView()">Generate Slate View</button>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const slateView = document.getElementById('slate-view');
        let currentChord = new Set();
        let keysDown = new Set();
        const brailleKeys = ['f', 'd', 's', 'j', 'k', 'l'];

        editor.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (brailleKeys.includes(key)) {
                e.preventDefault();
                currentChord.add(key);
                keysDown.add(key);
            } else if (key === ' ') {
                e.preventDefault();
                insertAtCursor('\u2800');
            } else if (key === 'enter') {
                e.preventDefault();
                insertAtCursor('\n');
            }
        });

        editor.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (brailleKeys.includes(key)) {
                keysDown.delete(key);
                if (keysDown.size === 0 && currentChord.size > 0) {
                    const char = calculateBraille(currentChord);
                    insertAtCursor(char);
                    currentChord.clear();
                }
            }
        });

        function calculateBraille(chord) {
            let val = 0;
            if (chord.has('f')) val |= 0x01; // Dot 1
            if (chord.has('d')) val |= 0x02; // Dot 2
            if (chord.has('s')) val |= 0x04; // Dot 3
            if (chord.has('j')) val |= 0x08; // Dot 4
            if (chord.has('k')) val |= 0x10; // Dot 5
            if (chord.has('l')) val |= 0x20; // Dot 6
            return String.fromCharCode(0x2800 + val);
        }

        function insertAtCursor(char) {
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const node = document.createTextNode(char);
                range.insertNode(node);
                range.setStartAfter(node);
                range.setEndAfter(node);
                sel.removeAllRanges();
                sel.addRange(range);
                
                checkHardWordWrap();
            }
        }

        function checkHardWordWrap() {
            const text = editor.innerText;
            const lines = text.split('\n');
            let modified = false;

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].length > 40) {
                    const lastSpace = lines[i].lastIndexOf('\u2800', 40);
                    if (lastSpace !== -1) {
                        // Break at the last space before char 40
                        const lineStart = lines[i].substring(0, lastSpace);
                        const lineRest = lines[i].substring(lastSpace + 1);
                        lines[i] = lineStart;
                        lines.splice(i + 1, 0, lineRest);
                    } else {
                        // Hard break at 40 if no space found
                        const lineStart = lines[i].substring(0, 40);
                        const lineRest = lines[i].substring(40);
                        lines[i] = lineStart;
                        lines.splice(i + 1, 0, lineRest);
                    }
                    modified = true;
                }
            }

            if (modified) {
                // Save cursor position roughly
                const offset = getCursorOffset(editor);
                editor.innerText = lines.join('\n');
                setCursorOffset(editor, offset);
            }
        }

        function getCursorOffset(el) {
            const sel = window.getSelection();
            const range = sel.getRangeAt(0);
            const preRange = range.cloneRange();
            preRange.selectNodeContents(el);
            preRange.setEnd(range.endContainer, range.endOffset);
            return preRange.toString().length;
        }

        function setCursorOffset(el, offset) {
            const range = document.createRange();
            const sel = window.getSelection();
            let charCount = 0;
            const nodeStack = [el];
            while (nodeStack.length > 0) {
                const node = nodeStack.pop();
                if (node.nodeType === 3) {
                    const nextCount = charCount + node.length;
                    if (offset <= nextCount) {
                        range.setStart(node, offset - charCount);
                        range.collapse(true);
                        sel.removeAllRanges();
                        sel.addRange(range);
                        return;
                    }
                    charCount = nextCount;
                } else {
                    for (let i = node.childNodes.length - 1; i >= 0; i--) {
                        nodeStack.push(node.childNodes[i]);
                    }
                }
            }
        }

        function flipCell(char) {
            let code = char.charCodeAt(0) - 0x2800;
            if (code < 0 || code > 255) return char;
            let flipped = 0;
            if (code & 0x01) flipped |= 0x08; 
            if (code & 0x02) flipped |= 0x10; 
            if (code & 0x04) flipped |= 0x20; 
            if (code & 0x08) flipped |= 0x01; 
            if (code & 0x10) flipped |= 0x02; 
            if (code & 0x20) flipped |= 0x04; 
            return String.fromCharCode(0x2800 + flipped);
        }

        function activateSlateView() {
            const lines = editor.innerText.split('\n');
            const processed = lines.map(line => {
                // Flip bits and then reverse order for RTL
                return line.split('').map(flipCell).reverse().join('');
            });
            slateView.innerText = processed.join('\n');
        }
    </script>
</body>
</html>
