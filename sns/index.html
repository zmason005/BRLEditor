<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Stylus Braille Editor - 40 Cell Lock</title>
    <style>
        @font-face {
            font-family: 'SimBraille';
            src: url('main/SimBraille.ttf') format('truetype');
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        .book-container {
            display: flex;
            justify-content: center;
            flex: 1;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
        }

        section {
            display: flex;
            flex-direction: column;
            /* width is calculated to fit exactly 40 chars of SimBraille */
            width: 42ch; 
            box-sizing: border-box;
        }

        #editor-region {
            border-right: 2px solid #fff;
            padding-right: 25px;
        }

        #translation-region {
            padding-left: 25px;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 8px;
            text-align: center;
        }

        #editor, #slate-view {
            height: 500px;
            background-color: #000;
            color: #fff;
            font-family: 'SimBraille', monospace;
            font-size: 28px;
            line-height: 1.2;
            padding: 15px;
            border: 1px solid #333;
            outline: none;
            overflow-y: auto;
            overflow-x: hidden; 
            white-space: pre-wrap; /* Changed to pre-wrap for better break handling */
            word-break: break-all;
        }

        #slate-view {
            direction: rtl; 
            background-color: #050505;
        }

        .toolbar {
            width: 100%;
            padding: 20px;
            background: #111;
            display: flex;
            justify-content: center;
            border-top: 1px solid #444;
        }

        button {
            padding: 12px 30px;
            background-color: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover { background-color: #ccc; }
    </style>
</head>
<body>

    <header>
        <h1>D-Stylus Braille Editor</h1>
    </header>

    <div class="book-container">
        <section id="editor-region" aria-label="editor">
            <span class="label">Left Page: Editor (LTR)</span>
            <div id="editor" contenteditable="true" spellcheck="false" autofocus></div>
        </section>

        <section id="translation-region" aria-label="translation">
            <span class="label">Right Page: Slate (RTL & Mirrored)</span>
            <div id="slate-view"></div>
        </section>
    </div>

    <div class="toolbar">
        <button onclick="activateSlateView()">Generate Slate View</button>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const slateView = document.getElementById('slate-view');
        let currentChord = new Set();
        let keysDown = new Set();
        const brailleKeys = ['f', 'd', 's', 'j', 'k', 'l'];

        editor.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (brailleKeys.includes(key)) {
                e.preventDefault();
                currentChord.add(key);
                keysDown.add(key);
            } else if (key === ' ') {
                e.preventDefault();
                processInput('\u2800');
            } else if (key === 'enter') {
                e.preventDefault();
                processInput('\n');
            }
        });

        editor.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (brailleKeys.includes(key)) {
                keysDown.delete(key);
                if (keysDown.size === 0 && currentChord.size > 0) {
                    const char = calculateBraille(currentChord);
                    processInput(char);
                    currentChord.clear();
                }
            }
        });

        function calculateBraille(chord) {
            let val = 0;
            if (chord.has('f')) val |= 0x01;
            if (chord.has('d')) val |= 0x02;
            if (chord.has('s')) val |= 0x04;
            if (chord.has('j')) val |= 0x08;
            if (chord.has('k')) val |= 0x10;
            if (chord.has('l')) val |= 0x20;
            return String.fromCharCode(0x2800 + val);
        }

        function processInput(char) {
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);

            // 1. Calculate current line length before inserting
            const fullText = editor.innerText;
            const caretPos = getCaretCharacterOffsetWithin(editor);
            const lines = fullText.substring(0, caretPos).split('\n');
            const currentLineText = lines[lines.length - 1];

            // 2. Word Wrap Logic (Triggered at 40)
            if (currentLineText.length >= 40 && char !== '\n') {
                const lastSpace = currentLineText.lastIndexOf('\u2800');
                
                // If a space is nearby (within last 10 chars), wrap there
                if (lastSpace !== -1 && (currentLineText.length - lastSpace) < 10) {
                    // This is handled by replacing the space with a newline
                    // For simplicity in this build, we perform a hard break at 40
                    const br = document.createTextNode('\n');
                    range.insertNode(br);
                    range.setStartAfter(br);
                } else {
                    // Hard break
                    const br = document.createTextNode('\n');
                    range.insertNode(br);
                    range.setStartAfter(br);
                }
            }

            // 3. Insert the character
            const node = document.createTextNode(char);
            range.deleteContents();
            range.insertNode(node);
            range.setStartAfter(node);
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
        }

        function getCaretCharacterOffsetWithin(element) {
            let caretOffset = 0;
            const doc = element.ownerDocument || element.document;
            const win = doc.defaultView || doc.parentWindow;
            const sel = win.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const preCaretRange = range.cloneRange();
                preCaretRange.selectNodeContents(element);
                preCaretRange.setEnd(range.endContainer, range.endOffset);
                caretOffset = preCaretRange.toString().length;
            }
            return caretOffset;
        }

        function flipCell(char) {
            let code = char.charCodeAt(0) - 0x2800;
            if (code < 0 || code > 255) return char;
            let flipped = 0;
            if (code & 0x01) flipped |= 0x08; 
            if (code & 0x02) flipped |= 0x10; 
            if (code & 0x04) flipped |= 0x20; 
            if (code & 0x08) flipped |= 0x01; 
            if (code & 0x10) flipped |= 0x02; 
            if (code & 0x20) flipped |= 0x04; 
            return String.fromCharCode(0x2800 + flipped);
        }

        function activateSlateView() {
            // Use innerText to preserve the line breaks we've inserted
            const lines = editor.innerText.split('\n');
            const processed = lines.map(line => {
                return line.split('').map(flipCell).reverse().join('');
            });
            slateView.innerText = processed.join('\n');
        }
    </script>
</body>
</html>
