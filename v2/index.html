<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille Editor - Stabilized iOS Stream</title>
    <style>
        html, body { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
        }
        body { 
            color: #fff; 
            font-family: 'SimBraille', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
        }
        #editor {
            width: 90vw;
            height: 70vh;
            background: #111;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px;
            font-size: 24px;
            line-height: 1.6;
            outline: none;
            resize: none;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button { 
            padding: 10px 20px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #fff; 
            cursor: pointer; 
            font-family: sans-serif;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="copyCleanText()">Copy Content Only</button>
        <button onclick="clearEditor()">Clear All</button>
    </div>

    <textarea id="editor" spellcheck="false" wrap="off"></textarea>

    <script>
        const editor = document.getElementById('editor');
        const brailleMap = { '1':'⠂', '2':'⠆', '3':'⠒', '4':'⠲', '5':'⠢', '6':'⠖', '7':'⠶', '8':'⠦', '9':'⠔', '0':'⠴' };
        const GUTTER_CHARS = /^[⠂⠆⠒⠲⠢⠖⠶⠦⠔⠴]+/;

        let isNavigating = false;

        // ---- Gutter helpers ----------------------------------------------

        function getGutter(index) {
            return (index + 1).toString().split('').map(d => brailleMap[d]).join('');
        }

        // Strips ONLY a leading run of gutter-digit characters. Never touches
        // characters elsewhere in the line, so real content can never be
        // silently deleted by cleanup.
        function stripLeadingGutter(line) {
            return line.replace(GUTTER_CHARS, '');
        }

        function getContents(value) {
            return value.split('\n').map(stripLeadingGutter);
        }

        function rebuildValue(contents) {
            return contents.map((c, i) => getGutter(i) + c).join('\n');
        }

        // ---- Position <-> offset conversion -------------------------------
        // "line/offsetInContent" = position relative to a line's content
        //   (gutter already excluded).
        // "flat offset"  = index into contents.join('\n') (newlines counted
        //   as real characters - used for delete range math, since deleting
        //   a newline character is exactly what a line-merge is).
        // "pure offset"  = sum of content lengths only, newlines NOT counted
        //   (used to carry the cursor through word-wrap reflow, since wrap
        //   only moves characters across a boundary without adding/removing
        //   real content).

        function absOffsetFromPos(value, pos) {
            const lineStart = value.lastIndexOf('\n', pos - 1) + 1;
            const line = value.substring(0, pos).split('\n').length - 1;
            const gutterLen = getGutter(line).length;
            const offsetInContent = Math.max(0, pos - lineStart - gutterLen);
            return { line, offsetInContent };
        }

        function flatOffset(contents, line, offsetInContent) {
            let total = 0;
            for (let i = 0; i < line; i++) total += contents[i].length + 1;
            return total + offsetInContent;
        }

        function posFromFlatOffset(contents, flat) {
            let remaining = flat;
            for (let i = 0; i < contents.length; i++) {
                if (remaining <= contents[i].length) return { line: i, offsetInContent: remaining };
                remaining -= contents[i].length + 1;
            }
            const last = contents.length - 1;
            return { line: last, offsetInContent: contents[last].length };
        }

        function pureOffset(contents, line, offsetInContent) {
            let total = 0;
            for (let i = 0; i < line; i++) total += contents[i].length;
            return total + offsetInContent;
        }

        function posFromPureOffset(contents, pure) {
            let remaining = pure;
            for (let i = 0; i < contents.length; i++) {
                if (remaining <= contents[i].length) return { line: i, offsetInContent: remaining };
                remaining -= contents[i].length;
            }
            const last = contents.length - 1;
            return { line: last, offsetInContent: contents[last].length };
        }

        function absolutePosInValue(contents, line, offsetInContent) {
            let pos = 0;
            for (let i = 0; i < line; i++) pos += getGutter(i).length + contents[i].length + 1;
            return pos + getGutter(line).length + offsetInContent;
        }

        // ---- Word-wrap (unchanged heuristic, now operating on pure content) --

        function wrapLines(contents, isWordBoundary) {
            const lines = contents.slice();
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].length > 40) {
                    let breakAt = lines[i].lastIndexOf(' ', 40);

                    if (breakAt === -1 && lines[i].length > 45) {
                        breakAt = 40;
                    }

                    if (breakAt !== -1 && (isWordBoundary || lines[i].length > 45)) {
                        let keep = lines[i].substring(0, breakAt);
                        let move = lines[i].substring(breakAt).trimStart();

                        lines[i] = keep;
                        if (lines[i + 1] !== undefined) {
                            lines[i + 1] = move + (lines[i + 1].startsWith(' ') || move.endsWith(' ') ? "" : " ") + lines[i + 1].trimStart();
                        } else {
                            lines.push(move);
                        }
                    }
                }
            }
            return lines;
        }

        // ---- Commit helper: wraps content, carries the cursor through the
        // reflow using pure-offset tracking, writes value + selection + storage.

        function commitContents(contents, pure) {
            const wrapped = wrapLines(contents, false);
            const { line, offsetInContent } = posFromPureOffset(wrapped, pure);
            editor.value = rebuildValue(wrapped);
            const newPos = absolutePosInValue(wrapped, line, offsetInContent);
            editor.setSelectionRange(newPos, newPos);
            localStorage.setItem('braille_editor_v1', editor.value);
            scaleFont();
        }

        function scaleFont() {
            const lines = editor.value.split('\n');
            const maxGutterSize = lines.length.toString().length;
            const totalCells = 40 + maxGutterSize;
            const fontSize = (editor.clientWidth / totalCells) * 0.92;
            editor.style.fontSize = fontSize + 'px';
        }

        function lockCursorPastGutter() {
            if (isNavigating) return;

            const pos = editor.selectionStart;
            const lineStartPos = editor.value.lastIndexOf('\n', pos - 1) + 1;
            const currentLineIdx = editor.value.substring(0, pos).split('\n').length - 1;
            const gutterLength = getGutter(currentLineIdx).length;
            const relativePos = pos - lineStartPos;

            if (relativePos < gutterLength) {
                const targetPos = lineStartPos + gutterLength;
                editor.setSelectionRange(targetPos, targetPos);
            }
        }

        // ---- Backspace / Delete: handled manually so a deletion can never
        // land inside a gutter or leave a gutter fragment embedded in content.
        // Works for both collapsed cursor and range selections.

        function handleDelete(e, forward) {
            e.preventDefault();

            const value = editor.value;
            const contents = getContents(value);

            const start = absOffsetFromPos(value, editor.selectionStart);
            const end = absOffsetFromPos(value, editor.selectionEnd);

            let flatStart = flatOffset(contents, start.line, start.offsetInContent);
            let flatEnd = flatOffset(contents, end.line, end.offsetInContent);
            const flatStr = contents.join('\n');

            if (flatStart === flatEnd) {
                if (forward) {
                    if (flatEnd >= flatStr.length) return; // nothing after
                    flatEnd += 1;
                } else {
                    if (flatStart === 0) return; // nothing before
                    flatStart -= 1;
                }
            }

            const newFlatStr = flatStr.substring(0, flatStart) + flatStr.substring(flatEnd);
            const newContents = newFlatStr.split('\n');

            // Convert the flat cursor position (which counts newlines) into a
            // pure content offset (which doesn't), so it survives wrapLines().
            const { line, offsetInContent } = posFromFlatOffset(newContents, flatStart);
            const pure = pureOffset(newContents, line, offsetInContent);

            commitContents(newContents, pure);
        }

        editor.addEventListener('keydown', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].includes(e.key)) {
                isNavigating = true;
                return;
            }
            isNavigating = false;

            if (e.key === 'Backspace') {
                handleDelete(e, false);
            } else if (e.key === 'Delete') {
                handleDelete(e, true);
            }
        });

        editor.addEventListener('input', (e) => {
            // iOS assistive-tech proxy character for a forced line break.
            if (editor.value.includes('Ê')) {
                const pos = editor.selectionStart;
                editor.value = editor.value.replace(/Ê/g, '\n');
                editor.setSelectionRange(pos, pos);
            }

            const value = editor.value;
            const pos = editor.selectionStart;
            const contents = getContents(value);
            const { line, offsetInContent } = absOffsetFromPos(value, pos);
            const pure = pureOffset(contents, line, offsetInContent);

            const isWordBoundary = e.data === ' ' || e.inputType === 'insertLineBreak' || e.inputType === 'insertFromPaste';
            const wrapped = wrapLines(contents, isWordBoundary);
            const target = posFromPureOffset(wrapped, pure);

            editor.value = rebuildValue(wrapped);
            const newPos = absolutePosInValue(wrapped, target.line, target.offsetInContent);
            editor.setSelectionRange(newPos, newPos);

            localStorage.setItem('braille_editor_v1', editor.value);
            scaleFont();
            lockCursorPastGutter();
        });

        editor.addEventListener('click', () => {
            isNavigating = false;
            lockCursorPastGutter();
        });

        editor.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home'].includes(e.key)) {
                lockCursorPastGutter();
            }
        });

        window.onload = () => {
            const saved = localStorage.getItem('braille_editor_v1');
            if (saved) {
                // Self-heal: re-derive contents from whatever was saved and
                // rebuild gutters fresh, in case older/corrupted data exists.
                const contents = getContents(saved);
                editor.value = rebuildValue(wrapLines(contents, true));
            } else {
                editor.value = getGutter(0);
            }
            scaleFont();
            editor.focus();

            const startPos = getGutter(0).length;
            editor.setSelectionRange(startPos, startPos);
        };

        function copyCleanText() {
            const clean = getContents(editor.value).join('\n');
            navigator.clipboard.writeText(clean).then(() => {
                alert("Clean text copied to clipboard!");
            });
        }

        function clearEditor() {
            if (confirm("Clear all?")) {
                localStorage.removeItem('braille_editor_v1');
                location.reload();
            }
        }
    </script>
</body>
</html>
