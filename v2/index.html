<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Braille Smart Editor</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; }
        #editor { width: 100%; height: 70vh; font-family: monospace; font-size: 1.2rem; padding: 10px; }
        .controls { margin-bottom: 10px; display: flex; gap: 15px; align-items: center; }
        #announcer { position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div class="controls">
    <label>Cells: <input type="number" id="cellLimit" value="40" min="10" max="80" style="width: 50px;"></label>
    <button onclick="formatBRF()">Compile & Copy BRF</button>
    <button onclick="clearEditor()" style="color: red;">Clear</button>
</div>

<textarea id="editor" spellcheck="false" placeholder="Start typing..."></textarea>
<div id="announcer" aria-live="polite"></div>

<script>
    const editor = document.getElementById('editor');
    const announcer = document.getElementById('announcer');
    const BUI_ANCHOR = '\u2800'; // Braille Blank
    const DIGIT_MAP = ['⠴', '⠂', '⠆', '⠒', '⠲', '⠢', '⠖', '⠶', '⠦', '⠔'];

    let state = {
        rawText: localStorage.getItem('braille_editor_content') || "",
        cursor: 0,
        maxCells: parseInt(localStorage.getItem('braille_cell_limit')) || 40
    };

    // --- Core Logic ---

    function toBrailleNum(n) {
        return n.toString().split('').map(d => DIGIT_MAP[parseInt(d)]).join('');
    }

    function applyBrailleFormatting(text) {
        const lines = [];
        let remaining = text;

        let lineNum = 1;
        while (remaining.length > 0) {
            if (remaining.length <= state.maxCells) {
                lines.push(BUI_ANCHOR + toBrailleNum(lineNum++) + remaining);
                break;
            }

            // Smart Wrap: Find last space before limit
            let splitIdx = remaining.lastIndexOf(' ', state.maxCells);
            if (splitIdx === -1) splitIdx = state.maxCells; // Force break if no space

            lines.push(BUI_ANCHOR + toBrailleNum(lineNum++) + remaining.substring(0, splitIdx));
            remaining = remaining.substring(splitIdx).trimStart();
        }
        return lines.join('');
    }

    function updateView() {
        const formatted = applyBrailleFormatting(state.rawText);
        editor.value = formatted;
        
        // Map clean cursor to dirty UI position
        let cleanCount = 0;
        let dirtyIdx = 0;
        while (cleanCount < state.cursor && dirtyIdx < formatted.length) {
            if (formatted[dirtyIdx] !== BUI_ANCHOR && !DIGIT_MAP.includes(formatted[dirtyIdx])) {
                cleanCount++;
            }
            dirtyIdx++;
        }
        editor.setSelectionRange(dirtyIdx, dirtyIdx);
    }

    // --- Event Listeners ---

    editor.addEventListener('beforeinput', (e) => {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const data = e.data || "";

        state.rawText = state.rawText.slice(0, start) + data + state.rawText.slice(end);
        state.cursor = start + data.length;
        
        localStorage.setItem('braille_editor_content', state.rawText);
        updateView();
    });

    editor.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' || e.key === 'Delete') {
            e.preventDefault();
            const start = editor.selectionStart;
            const end = editor.selectionEnd;

            if (start !== end) {
                state.rawText = state.rawText.slice(0, start) + state.rawText.slice(end);
                state.cursor = start;
            } else if (e.key === 'Backspace' && start > 0) {
                state.rawText = state.rawText.slice(0, start - 1) + state.rawText.slice(start);
                state.cursor = start - 1;
            } else if (e.key === 'Delete' && start < state.rawText.length) {
                state.rawText = state.rawText.slice(0, start) + state.rawText.slice(start + 1);
                state.cursor = start;
            }
            localStorage.setItem('braille_editor_content', state.rawText);
            updateView();
        }
    });

    document.getElementById('cellLimit').addEventListener('change', (e) => {
        state.maxCells = parseInt(e.target.value);
        localStorage.setItem('braille_cell_limit', state.maxCells);
        announcer.innerText = `Line width updated to ${state.maxCells}`;
        updateView();
    });

    function formatBRF() {
        // Strip headers, replace with \n
        const regex = new RegExp(BUI_ANCHOR + '[' + DIGIT_MAP.join('') + ']+', 'g');
        const brf = state.rawText.replace(regex, '\n').trim();
        navigator.clipboard.writeText(brf).then(() => alert("BRF Copied to clipboard!"));
    }

    function clearEditor() {
        if (confirm("Clear all text?")) {
            state.rawText = ""; state.cursor = 0;
            localStorage.removeItem('braille_editor_content');
            updateView();
        }
    }

    window.onload = updateView;
</script>
</body>
</html>
